name: Build Signed Game APK and AAB
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle Automatically
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      # ✨ Yeh step bina aapke jhanjhat ke automatic Keystore file bana dega
      - name: Generate Release Keystore Automatically
        run: |
          keytool -genkeypair -v -keystore release.keystore -alias cricketalias -keyalg RSA -keysize 2048 -validity 10000 -storepass cricket2026 -keypass cricket2026 -dname "CN=Sumit, O=CricketManager, C=IN"

      # 🚀 Ab signed app build hoga
      - name: Compile Signed APK and AAB Bundle
        run: |
          gradle :app:bundleRelease
          gradle :app:assembleRelease

      - name: Upload Completed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cricket-Manager-26-Signed-Builds
          path: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/bundle/release/*.aab
