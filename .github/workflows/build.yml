name: Build Game APK and AAB
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle Automatically
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Compile APK and AAB Bundle
        run: |
          gradle :app:assembleDebug
          gradle :app:bundleDebug

      - name: Upload Completed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cricket-Manager-26-Builds
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/bundle/debug/*.aab
