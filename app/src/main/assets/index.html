<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0B0E">
<title>CRICKET MANAGER 26</title>
<style>
/* ===================== TOKENS ===================== */
:root{
  --paper:#0A0B0E;
  --paper-2:#16181D;
  --ink:#EDEEF1;
  --ink-soft:#8B93A0;
  --leather:#E5533D;
  --leather-dark:#B23A28;
  --brass:#D9B44A;
  --pitch:#12213A;
  --pitch-dark:#0B1526;
  --line:#2A2D35;
  --good:#46C97A;
  --bad:#FF5C4D;
  --blue:#4FA3F7;
  --purple:#B98CE0;
  --on-dark:#F5F6F8;
  --on-light:#14161A;
  --shadow: 0 4px 14px rgba(0,0,0,0.45);
  --radius: 10px;
  font-size: 16px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y: contain;
  min-height:100vh;
}
.mono{font-family:'SF Mono','Courier New',monospace;}
h1,h2,h3,h4{font-family:inherit; font-weight:800; letter-spacing:0.01em; margin:0;}
button{font-family:inherit;}
::-webkit-scrollbar{width:0;height:0;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

/* ===================== LAYOUT ===================== */
#app{
  max-width:520px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(79,163,247,0.08), transparent 60%),
    var(--paper);
  padding-bottom: env(safe-area-inset-bottom);
}
header.topbar{
  background:linear-gradient(135deg, var(--pitch), var(--pitch-dark));
  color:var(--on-dark);
  padding:14px 16px calc(14px + env(safe-area-inset-top)) 16px;
  padding-top: calc(14px + env(safe-area-inset-top));
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:20;
  box-shadow:0 3px 10px rgba(0,0,0,0.45);
}
header.topbar .brand{
  font-size:1.05rem; letter-spacing:0.08em; text-transform:uppercase;
  display:flex; align-items:center; gap:8px; font-weight:800;
}
header.topbar .brand .seam{
  width:10px;height:10px;border-radius:50%;
  background:var(--leather); border:1.5px dashed rgba(245,246,248,0.6);
}
header.topbar .sub{font-size:0.68rem; opacity:0.75; font-family:monospace; letter-spacing:0.05em; color:var(--brass);}
header.topbar .back-btn{
  background:none;border:1px solid rgba(245,246,248,0.35);color:var(--on-dark);
  padding:6px 10px;border-radius:var(--radius);font-size:0.85rem;cursor:pointer;
}
main{flex:1; padding:14px 14px 90px 14px;}
.screen{animation:fadein 0.32s cubic-bezier(.22,.8,.36,1);}
.screen.noanim{animation:none;}
@keyframes fadein{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
.btn, .prow, .opt, .stratrow button, nav.bottomnav button, .gridsel .opt{
  transition:transform 0.12s ease, box-shadow 0.12s ease, background-color 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
}
.card{transition:box-shadow 0.18s ease, border-color 0.18s ease;}
.scoreboard .score, .scoreboard .overs, .scoreboard .metarow, .scoreboard .batline, .scoreboard .bowlline{
  transition: color 0.2s ease;
}

/* ===================== TYPOGRAPHY ===================== */
.eyebrow{font-family:monospace; font-size:0.65rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass); margin-bottom:4px;}
.pagetitle{font-size:1.5rem; margin-bottom:2px; color:var(--ink); font-weight:800;}
.pagesub{font-size:0.82rem; color:var(--ink-soft); margin-bottom:14px;}

/* ===================== CARDS ===================== */
.card{
  background:var(--paper-2);
  border:1px solid var(--line);
  border-left:4px solid var(--leather);
  border-radius:var(--radius);
  padding:12px 14px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}
.card.brass{border-left-color:var(--brass);}
.card.pitchline{border-left-color:var(--blue);}
.card h3{font-size:0.95rem; margin-bottom:6px; color:var(--ink);}
.rowline{display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px dotted var(--line); font-size:0.85rem;}
.rowline:last-child{border-bottom:none;}
.rowline .label{color:var(--ink-soft);}
.rowline .val{font-family:monospace; font-weight:600; color:var(--ink);}

/* ===================== BUTTONS ===================== */
.btn{
  display:block; width:100%; text-align:center;
  background:var(--pitch); color:var(--on-dark);
  border:none; border-radius:var(--radius);
  padding:13px 16px; font-size:0.95rem; letter-spacing:0.01em; font-weight:700;
  cursor:pointer; margin-bottom:10px;
  box-shadow:var(--shadow);
}
.btn:active{transform:translateY(1px); box-shadow:none;}
.btn.leather{background:var(--leather);}
.btn.brass{background:var(--brass); color:var(--on-light);}
.btn.outline{background:transparent; color:var(--ink); border:1.5px solid var(--line);}
.btn.small{padding:9px 10px; font-size:0.8rem; width:auto; display:inline-block; margin-right:6px;}
.btn:disabled{opacity:0.4; cursor:not-allowed;}
.btnrow{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;}
.btnrow .btn{flex:1; margin-bottom:0; min-width:90px;}

/* ===================== LIST / PLAYER ROWS ===================== */
.plist{list-style:none; margin:0 0 12px 0; padding:0;}
.prow{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--paper-2); border:1px solid var(--line);
  border-radius:var(--radius); padding:9px 10px; margin-bottom:6px;
  font-size:0.82rem; cursor:pointer;
}
.prow.selected{border-color:var(--leather); background:rgba(229,83,61,0.12); box-shadow:0 0 0 1px var(--leather) inset;}
.prow .pname{font-weight:700; color:var(--blue);}
.prow .prole{font-family:monospace; font-size:0.68rem; color:var(--ink-soft); text-transform:uppercase;}
.prow .pstats{font-family:monospace; font-size:0.72rem; text-align:right; color:var(--ink-soft);}
.badge{
  display:inline-block; font-family:monospace; font-size:0.62rem;
  padding:2px 6px; border-radius:8px; margin-left:6px; text-transform:uppercase;
  letter-spacing:0.03em;
}
.badge.excellent{background:#1F7A46;color:#EAF8EF;}
.badge.good{background:#3D8F63;color:#EAF8EF;}
.badge.average{background:#6E6440;color:#F5F1E4;}
.badge.poor{background:#8A4A2A;color:#FBEDE3;}
.badge.outofform{background:var(--bad);color:#2A0F0B;}

/* ===================== GRID SELECT (teams/venues) ===================== */
.gridsel{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.gridsel .opt{
  background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius);
  padding:10px; text-align:center; cursor:pointer; font-size:0.85rem; color:var(--ink);
}
.gridsel .opt.active{border-color:var(--brass); background:rgba(217,180,74,0.12); font-weight:700;}
.gridsel .opt small{display:block; font-family:monospace; font-size:0.62rem; color:var(--ink-soft); margin-top:2px;}

/* ===================== SCOREBOARD (match) — colourful ===================== */
.scoreboard{
  background:linear-gradient(135deg, var(--pitch), #17284A);
  color:var(--on-dark); border-radius:var(--radius);
  padding:14px; margin-bottom:12px; box-shadow:0 4px 14px rgba(0,0,0,0.4);
  border:1px solid rgba(79,163,247,0.25);
}
.scoreboard .teamline{display:flex; justify-content:space-between; align-items:baseline;}
.scoreboard .teamline .tname{font-size:0.8rem; text-transform:uppercase; letter-spacing:0.06em; opacity:0.85;}
.scoreboard .score{font-family:monospace; font-size:2.1rem; font-weight:800; letter-spacing:0.02em;}
.scoreboard .score .runs{color:var(--brass);}
.scoreboard .score .slash{color:rgba(245,246,248,0.5); font-weight:400;}
.scoreboard .score .wkts{color:var(--leather);}
.scoreboard .overs{font-family:monospace; font-size:0.95rem; color:var(--blue);}
.scoreboard .metarow{display:flex; justify-content:space-between; font-family:monospace; font-size:0.72rem; margin-top:8px; border-top:1px dashed rgba(245,246,248,0.2); padding-top:8px;}
.scoreboard .metarow .rrr{color:var(--purple); font-weight:700;}
.scoreboard .metarow .crr{color:var(--good); font-weight:700;}
.scoreboard .batline,.scoreboard .bowlline{font-family:monospace; font-size:0.78rem; margin-top:4px; display:flex; justify-content:space-between;}

.ballfeed{
  background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius);
  padding:0; margin-bottom:12px; max-height:230px; overflow-y:auto;
}
.ballentry{
  display:flex; gap:8px; padding:8px 10px; border-bottom:1px dotted var(--line);
  font-size:0.8rem; align-items:flex-start;
  animation: ballin 0.28s ease;
}
@keyframes ballin{from{opacity:0; transform:translateX(-6px);} to{opacity:1; transform:translateX(0);}}
.ballentry:last-child{border-bottom:none;}
.ballentry .baltag{
  font-family:monospace; font-weight:700; min-width:38px; text-align:center;
  background:var(--paper); border:1px solid var(--line); border-radius:3px; padding:2px 0; font-size:0.72rem; color:var(--ink-soft);
}
.ballentry.wkt .baltag{background:var(--bad); color:var(--on-light); border-color:var(--bad);}
.ballentry.four .baltag{background:var(--brass); color:var(--on-light); border-color:var(--brass);}
.ballentry.six .baltag{background:var(--purple); color:var(--on-light); border-color:var(--purple);}
.ballentry .balltext{flex:1; color:var(--ink-soft);}
.ballentry.wkt .balltext{color:var(--bad); font-weight:700;}
.ballentry.milestone{background:rgba(217,180,74,0.10);}
.ballentry.milestone .baltag{background:var(--brass); color:var(--on-light); border-color:var(--brass);}
.ballentry.milestone .balltext{color:var(--brass); font-weight:700;}

/* ===================== STRATEGY PICKER ===================== */
.stratrow{display:flex; gap:6px; margin-bottom:10px;}
.stratrow button{
  flex:1; padding:8px 4px; font-size:0.72rem; border-radius:var(--radius);
  border:1px solid var(--line); background:var(--paper); cursor:pointer; color:var(--ink-soft);
}
.stratrow button.active{background:var(--blue); color:var(--on-light); border-color:var(--blue); font-weight:700;}

/* ===================== BOTTOM NAV ===================== */
nav.bottomnav{
  position:fixed; bottom:0; left:0; right:0;
  max-width:520px; margin:0 auto;
  background:var(--pitch-dark); display:flex;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow:0 -3px 10px rgba(0,0,0,0.4);
  z-index:30; border-top:1px solid var(--line);
}
nav.bottomnav button{
  flex:1; background:none; border:none; color:var(--ink-soft);
  padding:10px 2px; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.04em;
  cursor:pointer; border-top:2px solid transparent; font-family:monospace;
}
nav.bottomnav button.active{color:var(--brass); border-top-color:var(--brass);}

/* ===================== MODAL / TOAST ===================== */
.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.78); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.modal{
  background:var(--paper-2); border-radius:var(--radius); padding:20px;
  max-width:440px; width:100%; max-height:85vh; overflow-y:auto;
  border-top:5px solid var(--leather); box-shadow:0 10px 30px rgba(0,0,0,0.55);
  animation:fadein 0.2s ease; color:var(--ink);
}
.toast{
  position:fixed; bottom:76px; left:50%; transform:translateX(-50%);
  background:var(--pitch-dark); color:var(--on-dark); padding:9px 16px; border-radius:20px;
  font-size:0.78rem; z-index:200; box-shadow:0 3px 12px rgba(0,0,0,0.5);
  animation:toastin 0.25s ease; border:1px solid var(--line);
}
@keyframes toastin{from{opacity:0; transform:translate(-50%,10px);} to{opacity:1; transform:translate(-50%,0);}}

/* ===================== COIN ===================== */
.coinwrap{display:flex; justify-content:center; margin:26px 0;}
.coin{
  width:96px; height:96px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--brass), #8A6A1E 80%);
  border:4px solid #5E4712;
  display:flex; align-items:center; justify-content:center;
  color:#20160A; font-weight:800; font-size:0.9rem;
  box-shadow:0 4px 14px rgba(0,0,0,0.5);
}
.coin.flipping{animation:coinflip 1.1s ease-in-out;}
@keyframes coinflip{
  0%{transform:rotateY(0) translateY(0);}
  50%{transform:rotateY(900deg) translateY(-40px);}
  100%{transform:rotateY(1800deg) translateY(0);}
}

/* ===================== PROGRESS BAR (training) ===================== */
.progwrap{background:var(--paper); border:1px solid var(--line); border-radius:10px; height:14px; overflow:hidden; margin:10px 0;}
.progbar{height:100%; background:linear-gradient(90deg,var(--blue),var(--purple),var(--brass)); width:0%; transition:width 0.2s linear;}

/* ===================== TABLE ===================== */
table.stattable{width:100%; border-collapse:collapse; font-size:0.74rem;}
table.stattable th{
  text-align:left; font-family:monospace; text-transform:uppercase; font-size:0.62rem;
  color:var(--brass); border-bottom:1px solid var(--line); padding:5px 4px;
}
table.stattable td{padding:6px 4px; border-bottom:1px dotted var(--line); font-family:monospace; color:var(--ink);}
table.stattable tr.out td{color:var(--ink-soft);}

.pulse{animation:pulseglow 0.6s ease;}
@keyframes pulseglow{0%{background:rgba(217,180,74,0.3);} 100%{background:transparent;}}

.centered{text-align:center;}
.small{font-size:0.75rem;}
.spacer{height:8px;}
.hidden{display:none !important;}

/* ===================== MAP / REGION GRID ===================== */
.regionmap{display:flex; flex-direction:column; gap:10px;}
.regioncard{background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px;}
.regioncard h3{color:var(--blue); font-size:0.85rem; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px;}
.mapteamgrid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.mapteam{
  background:var(--paper); border:1px solid var(--line); border-radius:8px;
  padding:8px 10px; font-size:0.78rem; cursor:pointer; text-align:center; color:var(--ink);
}
.mapteam:active{transform:translateY(1px);}
.mapteam .pin{color:var(--leather); margin-right:4px;}

/* ===================== NEWS FEED ===================== */
.newsitem{
  background:var(--paper-2); border:1px solid var(--line); border-left:3px solid var(--blue);
  border-radius:var(--radius); padding:10px 12px; margin-bottom:8px; font-size:0.8rem;
}
.newsitem .newstag{font-family:monospace; font-size:0.6rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--brass); margin-bottom:3px; display:block;}
.newsitem.fanreaction{border-left-color:var(--purple);}
.newsitem.expert{border-left-color:var(--good);}
.newsitem.retirement{border-left-color:var(--leather);}
.newsitem.reaction{border-left-color:#E08A3C;}

/* ===================== TEAM DASHBOARD (modern layout) ===================== */
.dash-hero{
  position:relative; overflow:hidden;
  background:linear-gradient(135deg, var(--pitch) 0%, #1B2A4A 55%, #241238 100%);
  border-radius:16px; padding:20px 18px; margin-bottom:14px;
  border:1px solid rgba(79,163,247,0.25);
  box-shadow:0 8px 24px rgba(0,0,0,0.45);
}
.dash-hero::before{
  content:""; position:absolute; top:-40%; right:-15%; width:220px; height:220px;
  background:radial-gradient(circle, rgba(217,180,74,0.16), transparent 70%);
  pointer-events:none;
}
.dash-hero .dh-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.dash-hero .dh-flag{font-size:2.4rem; line-height:1;}
.dash-hero .dh-season{
  font-family:monospace; font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase;
  background:rgba(217,180,74,0.16); color:var(--brass); border:1px solid rgba(217,180,74,0.4);
  padding:4px 10px; border-radius:20px; white-space:nowrap;
}
.dash-hero .dh-name{font-size:1.5rem; font-weight:800; color:var(--on-dark); margin-top:8px;}
.dash-hero .dh-sub{font-size:0.78rem; color:rgba(245,246,248,0.7); margin-top:2px;}

.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
.stat-tile{
  background:var(--paper-2); border:1px solid var(--line); border-left:3px solid var(--line);
  border-radius:12px; padding:11px 13px; box-shadow:0 2px 8px rgba(0,0,0,0.25);
}
.stat-tile .stat-label{font-family:monospace; font-size:0.6rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-soft);}
.stat-tile .stat-value{font-size:1.15rem; font-weight:800; font-family:monospace; margin-top:3px; color:var(--ink);}
.stat-tile.accent-gold{border-left-color:var(--brass);}
.stat-tile.accent-blue{border-left-color:var(--blue);}
.stat-tile.accent-purple{border-left-color:var(--purple);}
.stat-tile.accent-green{border-left-color:var(--good);}
.stat-tile.accent-red{border-left-color:var(--bad);}

.section-title{
  display:flex; align-items:center; gap:8px; margin:18px 0 8px 0;
  font-family:monospace; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--ink-soft);
}
.section-title::before{content:""; width:4px; height:14px; background:var(--brass); border-radius:2px; display:inline-block;}
.section-title .st-action{margin-left:auto;}

.quick-actions{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;}
.quick-action-btn{
  background:var(--paper-2); border:1px solid var(--line); border-radius:12px;
  padding:12px 4px; text-align:center; cursor:pointer; color:var(--ink);
  display:flex; flex-direction:column; align-items:center; gap:5px; font-size:0.66rem;
  transition:transform 0.1s ease, border-color 0.15s ease;
}
.quick-action-btn .qa-icon{font-size:1.35rem;}
.quick-action-btn:active{transform:scale(0.96);}
.quick-action-btn.accent{border-color:var(--leather); background:rgba(229,83,61,0.08);}

.fixture-hero{
  background:linear-gradient(135deg, rgba(79,163,247,0.12), rgba(185,140,224,0.08));
  border:1px solid rgba(79,163,247,0.35); border-radius:14px; padding:14px 16px; margin-bottom:12px;
}
.fixture-hero .fh-tag{font-family:monospace; font-size:0.62rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--blue);}
.fixture-hero .fh-title{font-size:1.05rem; font-weight:800; color:var(--ink); margin:4px 0 8px 0;}

/* ===================== SOCIAL LIFE (tweet cards) ===================== */
.tweetcard{
  background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius);
  padding:10px 12px; margin-bottom:8px; font-size:0.82rem;
}
.tweetcard .thead{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
.tweetcard .handle{color:var(--blue); font-weight:700; font-size:0.82rem;}
.tweetcard .tteam{font-size:0.68rem; color:var(--ink-soft);}
.tweetcard.board .handle{color:var(--brass);}
.tweetcard .ttext{margin-top:4px; color:var(--ink);}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
"use strict";

/* =====================================================================
   CRICKET MANAGER 26 — core engine
   Single-file mobile text cricket management sim.
===================================================================== */

const SAVE_KEY = "cm26_save_v1";
const $ = sel => document.querySelector(sel);
const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className = cls; if(html!==undefined) e.innerHTML = html; return e; };
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const rand = (a,b) => Math.random()*(b-a)+a;
const randi = (a,b) => Math.floor(rand(a,b+1));
const pick = arr => arr[randi(0, arr.length-1)];
const weightedPick = (weights) => { // weights: [[key,weight],...]
  const total = weights.reduce((s,w)=>s+Math.max(0.0001,w[1]),0);
  let r = Math.random()*total;
  for(const w of weights){ r -= Math.max(0.0001,w[1]); if(r<=0) return w[0]; }
  return weights[weights.length-1][0];
};

/* ===================== NAME POOLS (fictional, per nation) ===================== */
const NAME_POOLS = {
"India":{f:["Arjun","Rohan","Vikram","Aditya","Karan","Rahul","Sanjay","Yuvraj","Dev","Ishaan","Aryan","Kabir","Nikhil","Varun","Siddharth"],l:["Sharma","Verma","Patel","Rathore","Malhotra","Nair","Choudhary","Iyer","Bhatt","Deshmukh","Kapoor","Reddy","Menon","Saxena","Chauhan"]},

/* ===================== PLAYER GENERATION ===================== */
let PLAYER_UID = 1;
function genName(team, usedNames){
  const pool = NAME_POOLS[team];
  let name, tries=0;
  do{
    name = pick(pool.f) + " " + pick(pool.l);
    tries++;
  } while(usedNames.has(name) && tries < 40);
  if(usedNames.has(name)) name += " " + randi(2,9);
  usedNames.add(name);
  return name;
}

function genPlayer(team, role, usedNames, tierRange){
  const [lo,hi] = tierRange;
  const base = randi(lo,hi);
  const experience = randi(0,140);
  const p = {
    id: PLAYER_UID++,
    name: genName(team, usedNames),
    role: role, // Batter, Bowler, All-Rounder, Wicketkeeper
    bowlType: null, // pace / spin
    overall: base,
    batSkill: 40,
    bowlSkill: 40,
    fitness: randi(82,100),
    form: pick(["Excellent","Good","Good","Average","Average","Average","Poor"]),
    formTrend: "flat", // "up" | "down" | "flat"
    experience: experience, // matches played (career)
    age: clamp(19 + Math.round(experience/13) + randi(-2,3), 18, 39),
    injury: { injured:false, daysLeft:0, type:null },
    personalCoach: false,
    bowlSpecialty: null, // "Death Overs Specialist" | "Middle Overs Specialist" | "Powerplay Specialist" | null
    career:{matches:0,innings:0,runs:0,balls:0,wickets:0,ballsBowled:0,runsConceded:0,hundreds:0,fifties:0,fiveFor:0,catches:0,runouts:0,stumpings:0,highScore:0,bestBowling:"0/0",fastestFifty:999,fastestHundred:999},
  };
  if(role==="Batter"){ p.batSkill = base + randi(-3,5); p.bowlSkill = randi(15,30); }
  else if(role==="Bowler"){ p.bowlSkill = base + randi(-3,5); p.batSkill = randi(15,32); p.bowlType = Math.random()<0.58 ? "pace":"spin"; }
  else if(role==="All-Rounder"){ p.batSkill = base - randi(2,8); p.bowlSkill = base - randi(2,8); p.bowlType = Math.random()<0.55 ? "pace":"spin"; }
  else if(role==="Wicketkeeper"){ p.batSkill = base + randi(-2,6); p.bowlSkill = randi(10,20); p.keeper = true; }
  p.batSkill = clamp(p.batSkill, 30, 99);
  p.bowlSkill = clamp(p.bowlSkill, 30, 99);
  if(p.bowlType==="pace"){ p.bowlSpecialty = pick(["Death Overs Specialist","Death Overs Specialist","Powerplay Specialist",null]); }
  else if(p.bowlType==="spin"){ p.bowlSpecialty = pick(["Middle Overs Specialist","Middle Overs Specialist","Middle Overs Specialist",null]); }
  return p;
}

function generateSquad(team){
  const tierRange = TIER_RANGE[TIER[team]];
  const usedNames = new Set();
  const roles = [];
  for(let i=0;i<8;i++) roles.push("Batter");
  for(let i=0;i<7;i++) roles.push("Bowler");
  for(let i=0;i<6;i++) roles.push("All-Rounder");
  for(let i=0;i<4;i++) roles.push("Wicketkeeper");
  return roles.map(r => genPlayer(team, r, usedNames, tierRange));
}

  return {Excellent:1.10, Good:1.04, Average:1.0, Poor:0.94, "Out of Form":0.88}[form] || 1.0;
}
function fitnessMultiplier(fit){ return clamp(0.85 + (fit/100)*0.20, 0.85, 1.05); }
function badgeClass(form){ return {Excellent:"excellent",Good:"good",Average:"average",Poor:"poor","Out of Form":"outofform"}[form]||"average"; }
const FORM_TIERS = ["Out of Form","Poor","Average","Good","Excellent"];

/* ===================== COACHING STAFF (contract-based) ===================== */
const COACH_FIRST = ["Graham","Trevor","Michael","Steve","Peter","Craig","Andrew","Darren","Neil","Martin","Gary","Colin","Alan","Brian","Keith","Owen","Derek","Nigel"];
const COACH_LAST = ["Whitmore","Sutherland","Adams","Blackwood","Fenwick","Harmon","Doust","Lacey","Rowntree","Sheldon","Marchant","Osei","Prasad","Yilmaz","Novak","Beckett","Hargrove","Delacroix"];
const COACH_ROLES = ["battingCoach","bowlingCoach","fieldingCoach","assistantCoach"];
const COACH_ROLE_LABEL = { battingCoach:"Batting Coach", bowlingCoach:"Bowling Coach", fieldingCoach:"Fielding Coach", assistantCoach:"Assistant Coach", physio:"Physio" };
function genCoachName(){ return pick(COACH_FIRST) + " " + pick(COACH_LAST); }
function genCoachCandidate(role){ return { name: genCoachName(), rating: randi(55,96), role }; }
function genCoachPool(role, count){
  const n = count || 15;
  const pool = [];
  for(let i=0;i<n;i++) pool.push(genCoachCandidate(role));
  return pool;
}
function coachContractCost(rating, years){ return Math.round(rating * years * 9000); }
function ensureStaff(team){
  STATE.staff = STATE.staff || {};
  if(!STATE.staff[team]){
    STATE.staff[team] = {
      battingCoach: { ...genCoachCandidate("battingCoach"), contractYears:3, yearsLeft:3, cost:0 },
      bowlingCoach: { ...genCoachCandidate("bowlingCoach"), contractYears:3, yearsLeft:3, cost:0 },
      fieldingCoach: { ...genCoachCandidate("fieldingCoach"), contractYears:3, yearsLeft:3, cost:0 },
      assistantCoach: { ...genCoachCandidate("assistantCoach"), contractYears:3, yearsLeft:3, cost:0 },
      physio: { ...genCoachCandidate("physio"), contractYears:3, yearsLeft:3, cost:0 },
    };
  }
  return STATE.staff[team];
}
function hireCoach(team, role, candidate, years){
  const fin = ensureFinance(team);
  const cost = coachContractCost(candidate.rating, years);
  if(fin.balance < cost) return { ok:false };
  fin.balance -= cost;
  const st = ensureStaff(team);
  st[role] = { name:candidate.name, rating:candidate.rating, role, contractYears:years, yearsLeft:years, cost };
  addNewsItem("result", `${team} have appointed ${candidate.name} as ${COACH_ROLE_LABEL[role]} on a ${years}-year deal.`);
  save();
  return { ok:true, cost };
}
function tickCoachContracts(){
  TEAM_LIST.forEach(team=>{
    if(!STATE.staff || !STATE.staff[team]) return;
    Object.keys(STATE.staff[team]).forEach(role=>{
      const st = STATE.staff[team][role];
      st.yearsLeft -= 1;
      if(st.yearsLeft<=0){
        addNewsItem("result", `${st.name}'s contract as ${team}'s ${COACH_ROLE_LABEL[role]} has expired.`);
        STATE.staff[team][role] = { ...genCoachCandidate(role), rating: randi(50,65), contractYears:1, yearsLeft:1, cost:0 };
      }
    });
  });
}
function staffBattingBonus(team){ return (ensureStaff(team).battingCoach.rating-70)/8; }
function staffBowlingBonus(team){ return (ensureStaff(team).bowlingCoach.rating-70)/8; }
function staffFieldingBonus(team){ return (ensureStaff(team).fieldingCoach.rating-70)/12; }
function staffAssistantBonus(team){ return (ensureStaff(team).assistantCoach.rating-70)/16; }
function staffPhysioRating(team){ return ensureStaff(team).physio.rating; }
function staffTrainingBonus(team, focus){
  const st = ensureStaff(team);
  const rating = focus==="Batting" ? st.battingCoach.rating : focus==="Bowling" ? st.bowlingCoach.rating : st.physio.rating;
  return clamp(Math.round((rating-70)/20), -1, 2);
}

/* ===================== PERSONAL COACH (for poor / out-of-form players) ===================== */
function assignPersonalCoach(team, player){
  const fin = ensureFinance(team);
  const fee = 60000;
  if(fin.balance < fee) return { ok:false };
  fin.balance -= fee;
  player.personalCoach = true;
  addNewsItem("result", `${team} have assigned a personal coach to work with ${player.name} on their form.`);
  save();
  return { ok:true };
}

/* ===================== FANBASE ===================== */
const FAN_BASE_BY_TIER = {1:800000, 2:400000, 3:150000, 4:50000};
function ensureFanbase(team){
  STATE.fanbase = STATE.fanbase || {};
  if(STATE.fanbase[team]==null) STATE.fanbase[team] = FAN_BASE_BY_TIER[TIER[team]];
  return STATE.fanbase[team];
}
function updateFanbase(team1, team2, winner, result){
  ensureFanbase(team1); ensureFanbase(team2);
  if(winner===null){
    const d1 = Math.round(STATE.fanbase[team1]*0.004), d2 = Math.round(STATE.fanbase[team2]*0.004);
    STATE.fanbase[team1] += d1; STATE.fanbase[team2] += d2;
    result.fanDelta = { [team1]: d1, [team2]: d2 };
    return;
  }
  const loser = winner===team1 ? team2 : team1;
  const upset = TIER[winner] > TIER[loser]; // higher tier number = weaker team pulling off an upset
  const winGainPct = (upset ? 0.028 : 0.013) + rand(0,0.01) + sponsorFanBonusPct(winner);
  const loseLossPct = 0.009 + rand(0,0.008);
  const winnerBefore = STATE.fanbase[winner], loserBefore = STATE.fanbase[loser];
  STATE.fanbase[winner] = Math.round(winnerBefore*(1+winGainPct));
  STATE.fanbase[loser] = Math.max(1000, Math.round(loserBefore*(1-loseLossPct)));
  result.fanDelta = { [winner]: STATE.fanbase[winner]-winnerBefore, [loser]: STATE.fanbase[loser]-loserBefore };
}

/* ===================== RECENT FORM (last 5) ===================== */
function updateRecentForm(team1, team2, winner){
  STATE.recentForm = STATE.recentForm || {};
  if(!STATE.recentForm[team1]) STATE.recentForm[team1] = [];
  if(!STATE.recentForm[team2]) STATE.recentForm[team2] = [];
  const r1 = winner===null ? "T" : (winner===team1 ? "W" : "L");
  const r2 = winner===null ? "T" : (winner===team2 ? "W" : "L");
  STATE.recentForm[team1].push(r1); if(STATE.recentForm[team1].length>5) STATE.recentForm[team1].shift();
  STATE.recentForm[team2].push(r2); if(STATE.recentForm[team2].length>5) STATE.recentForm[team2].shift();
}
function recentFormChips(team){
  const arr = (STATE.recentForm && STATE.recentForm[team]) || [];
  if(arr.length===0) return `<span class="small" style="color:var(--ink-soft);">No matches played yet</span>`;
  return arr.map(r=>{
    const cls = r==="W" ? "excellent" : r==="L" ? "outofform" : "average";
    return `<span class="badge ${cls}">${r}</span>`;
  }).join(" ");
}
function recentFormString(team){
  const arr = (STATE.recentForm && STATE.recentForm[team]) || [];
  return arr.length ? arr.join("-") : "No history";
}

/* ===================== RIVALRY SYSTEM ===================== */
function h2hKey(a,b){ return [a,b].sort().join("|"); }
function updateRivalry(team1, team2, winner){
  STATE.h2h = STATE.h2h || {};
  const key = h2hKey(team1,team2);
  if(!STATE.h2h[key]) STATE.h2h[key] = { teams:[team1,team2].sort(), matches:0, wins:{}, ties:0 };
  const rec = STATE.h2h[key];
  rec.matches++;
  if(winner) rec.wins[winner] = (rec.wins[winner]||0)+1;
  else rec.ties++;
}
function rivalryLabel(rec){
  const m = rec.matches;
  const winsArr = Object.values(rec.wins||{});
  const maxWin = winsArr.length ? Math.max(...winsArr) : 0;
  const balance = m>0 ? 1-(maxWin/m) : 0;
  if(m===0) return "New Fixture";
  if(m<3) return "Emerging Rivalry";
  if(m<6) return balance>=0.32 ? "Competitive Rivalry" : "One-Sided Fixture";
  return balance>=0.32 ? "Fierce Rivalry" : "Dominant Rivalry";
}

/* ===================== EXPERT ANALYSIS ===================== */
function topBattingPerformance(){
  let best=null, bestRuns=-1;
  MATCH.innings.forEach(inn=>{
    Object.entries(inn.bstats).forEach(([id,bs])=>{
      if(bs.runs>bestRuns){ bestRuns=bs.runs; best={id:Number(id), ...bs}; }
    });
  });
  return best;
}
function topBowlingPerformance(){
  let best=null, bestScore=-1;
  MATCH.innings.forEach(inn=>{
    Object.entries(inn.bowlerStats).forEach(([id,bw])=>{
      const score = bw.wkts*10 - bw.runs*0.05;
      if(score>bestScore){ bestScore=score; best={id:Number(id), ...bw}; }
    });
  });
  return best;
}
function findMatchPlayerById(id){ return [...MATCH.userXi, ...MATCH.oppXi].find(p=>p.id===id); }
function generateExpertAnalysis(result, momPlayer){
  const inn1 = MATCH.innings[0], inn2 = MATCH.innings[1];
  const bestBat = topBattingPerformance();
  const bestBowl = topBowlingPerformance();
  const batP = bestBat ? findMatchPlayerById(bestBat.id) : null;
  const bowlP = bestBowl ? findMatchPlayerById(bestBowl.id) : null;
  const scoreDiff = Math.abs(inn1.runs-inn2.runs);
  const closeness = scoreDiff<=15 ? "a tense, closely fought contest" : scoreDiff<=40 ? "a competitive match that swung late" : "a largely one-sided contest";
  const lines = [];
  lines.push(`Our panel called this ${closeness} at ${MATCH.venue.name}.`);
  if(batP && bestBat.runs>0) lines.push(`${batP.name}'s innings of ${bestBat.runs} off ${bestBat.balls} balls was the standout batting effort and shaped the way the match was played.`);
  if(bowlP && bestBowl.wkts>0) lines.push(`With the ball, ${bowlP.name} was the difference-maker, returning figures of ${bestBowl.wkts}/${bestBowl.runs} to swing momentum.`);
  if(result.draw){ lines.push(`Pundits felt honours were even by the close.`); }
  else if(result.winner){ lines.push(`Experts credit ${result.winner}'s discipline in the field and sharper strategy calls for sealing the win ${result.margin}.`); }
  else { lines.push(`A tie leaves both camps with plenty to debate.`); }
  if(momPlayer) lines.push(`${momPlayer.name} takes the Player of the Match award — analysts praised the composure shown under pressure.`);
  return lines.join(" ");
}

/* ===================== WHAT WENT WRONG (post-loss analysis) ===================== */
function generateWhatWentWrong(){
  const userInn = MATCH.innings.find(i=>teamOfXi(i.battingXi)===MATCH.userTeam);
  const oppInnWhenUserBowled = MATCH.innings.find(i=>teamOfXi(i.bowlingXi)===MATCH.userTeam);
  const lines = [];
  if(userInn){
    const cheapDismissals = Object.values(userInn.bstats).filter(bs=>bs.out && bs.runs<=5).length;
    if(cheapDismissals>=3) lines.push(`${cheapDismissals} batters were dismissed for 5 runs or fewer — the innings never recovered from those early setbacks.`);
    if(userInn.target){
      const runRate = userInn.balls>0 ? (userInn.runs/(userInn.balls/6)) : 0;
      if(userInn.runs<userInn.target && runRate<7.5) lines.push(`The required run rate crept out of reach — the chase never found the acceleration it needed.`);
    }
  }
  if(oppInnWhenUserBowled){
    let worst=null, worstEcon=-1;
    Object.entries(oppInnWhenUserBowled.bowlerStats).forEach(([id,bw])=>{
      if(bw.balls>=12){
        const econ = bw.runs/(bw.balls/6);
        if(econ>worstEcon){ worstEcon=econ; worst={id:Number(id), ...bw}; }
      }
    });
    if(worst && worstEcon>9){
      const p = findMatchPlayerById(worst.id);
      if(p) lines.push(`${p.name} leaked runs at ${worstEcon.toFixed(1)} an over — containing that spell might have changed the match.`);
    }
    if(Object.values(oppInnWhenUserBowled.bstats).some(bs=>bs.runs>=75)){
      lines.push(`One opposition batter was allowed to build a big score without the partnership being broken — a costly missed opportunity.`);
    }
  }
  if(lines.length===0) lines.push(`It came down to fine margins — a couple of key overs and a few small moments in the field decided this one.`);
  return lines.join(" ");
}

/* ===================== FINANCE / ECONOMY ===================== */
function playerWage(p){ return Math.round(p.overall*12000 + (p.age>=30 ? (p.age-29)*3000 : 0)); }
function computeTeamValue(team){ return Math.round(squadAvg(team)*400000 + ensureFanbase(team)*3); }
function computeWageBill(team){ return STATE.squads[team].reduce((sum,p)=>sum+playerWage(p), 0); }
function ensureFinance(team){
  STATE.finance = STATE.finance || {};
  if(!STATE.finance[team]){
    const value = computeTeamValue(team);
    STATE.finance[team] = { value, wageBill: computeWageBill(team), balance: Math.round(value*0.15) };
  } else {
    STATE.finance[team].value = computeTeamValue(team);
    STATE.finance[team].wageBill = computeWageBill(team);
  }
  return STATE.finance[team];
}
function updateFinance(team1, team2, winner, result){
  ensureFinance(team1); ensureFinance(team2);
  const base = 180000;
  result.financeDelta = {};
  [team1,team2].forEach(t=>{
    const fin = STATE.finance[t];
    let earn = base;
    if(winner===t) earn += 380000 + Math.round(fin.value*0.0015);
    earn += sponsorMatchIncome(t);
    // Wage bill is an ANNUAL figure; a team plays roughly a season's worth of matches,
    // so only a small slice of it is attributable to any single match.
    const wageCost = Math.round(fin.wageBill/150);
    const net = earn - wageCost;
    fin.balance += net;
    result.financeDelta[t] = net;
  });
}

/* ===================== SCOUTING ===================== */
function genProspect(team){
  const tierRange = TIER_RANGE[TIER[team]];
  const role = pick(["Batter","Bowler","All-Rounder","Wicketkeeper"]);
  const used = new Set(STATE.squads[team].map(p=>p.name));
  const lo = Math.max(30, tierRange[0]-15), hi = Math.max(lo+5, tierRange[1]-8);
  const p = genPlayer(team, role, used, [lo,hi]);
  p.age = randi(16,20);
  p.experience = 0;
  p.form = "Average";
  p.formTrend = "flat";
  p.potential = clamp(p.overall + randi(6,22), 45, 99);
  p.cost = Math.round(p.overall*9000 + p.potential*4500);
  return p;
}
function signProspect(team, prospect){
  const fin = ensureFinance(team);
  if(fin.balance < prospect.cost) return { ok:false, reason:"insufficient funds" };
  const squad = STATE.squads[team];
  const sameRole = squad.filter(x=>x.role===prospect.role).sort((a,b)=>a.overall-b.overall);
  const weakest = (sameRole[0]) || squad.slice().sort((a,b)=>a.overall-b.overall)[0];
  const idx = squad.indexOf(weakest);
  squad[idx] = prospect;
  fin.balance -= prospect.cost;
  releasePlayer(team, weakest);
  addNewsItem("result", `${team} have signed young talent ${prospect.name} (age ${prospect.age}) after releasing ${weakest.name}.`);
  if(weakest.career.matches>0) addNewsItem("reaction", generateDropReaction(weakest.name, "released"));
  save();
  return { ok:true, released:weakest };
}
function releasePlayer(team, player){
  STATE.releasedPlayers = STATE.releasedPlayers || {};
  STATE.releasedPlayers[team] = STATE.releasedPlayers[team] || [];
  STATE.releasedPlayers[team].push(player);
  if(STATE.releasedPlayers[team].length>20) STATE.releasedPlayers[team].shift();
}
function resignPlayer(team, player){
  const squad = STATE.squads[team];
  const sameRole = squad.filter(x=>x.role===player.role).sort((a,b)=>a.overall-b.overall);
  const weakest = sameRole[0] || squad.slice().sort((a,b)=>a.overall-b.overall)[0];
  const idx = squad.indexOf(weakest);
  squad[idx] = player;
  STATE.releasedPlayers[team] = STATE.releasedPlayers[team].filter(x=>x.id!==player.id);
  releasePlayer(team, weakest);
  addNewsItem("result", `${team} have re-signed ${player.name}, with ${weakest.name} released in exchange.`);
  save();
}

/* ===================== FIXTURES / SCHEDULE / TOURNAMENTS ===================== */
function quickSimAI(teamA, teamB){
  const a = squadAvg(teamA), b = squadAvg(teamB);
  const scoreA = Math.round(clamp(140 + (a-70)*1.3 + rand(-22,22), 60, 240));
  const scoreB = Math.round(clamp(140 + (b-70)*1.3 + rand(-22,22) + (scoreA>170?-6:6), 55, 240));
  const winner = scoreA===scoreB ? null : (scoreA>scoreB ? teamA : teamB);
  return { winner, scoreA, scoreB };
}
function pickVenueFor(team){
  if(STATE.homeGround && STATE.homeGround[team]){
    const chosen = VENUES[team].find(v=>v.name===STATE.homeGround[team]);
    if(chosen) return chosen;
  }
  return VENUES[team][randi(0,VENUES[team].length-1)];
}
function buildFixture(kind, mode, opponent, host, label){
  const venue = pickVenueFor(host);
  return { id: "fx"+(++PLAYER_UID), kind, mode, opponent, venue, venueHomeTeam:host, host, label, completed:false };
}
function eventTableInit(teams){
  const t = {};
  teams.forEach(team=>{ t[team] = { played:0, won:0, pts:0 }; });
  return t;
}
function eventRecordResult(table, teamA, teamB, winner){
  table[teamA].played++; table[teamB].played++;
  if(winner===null){ table[teamA].pts+=1; table[teamB].pts+=1; }
  else if(winner===teamA){ table[teamA].won++; table[teamA].pts+=2; }
  else { table[teamB].won++; table[teamB].pts+=2; }
}
function eventTop(table, n){
  return Object.entries(table).sort((x,y)=>y[1].pts-x[1].pts).slice(0,n).map(x=>x[0]);
}

function chooseHost(managedTeam, teamsInEvent){
  // Bias away from the user's own team so it doesn't feel like every series/tournament is played at home.
  if(Math.random() < 0.25) return managedTeam;
  const others = teamsInEvent.filter(t=>t!==managedTeam);
  return pick(others.length ? others : teamsInEvent);
}
function generateNextEvent(){
  const team = STATE.managedTeam;
  if(!team) return;
  STATE.scheduleCycle = (STATE.scheduleCycle||0);
  const pattern = ["bilateral","bilateral","tri","bilateral","bilateral","worldcup_t20","bilateral","bilateral","tri","worldcup_odi"];
  const kind = pattern[STATE.scheduleCycle % pattern.length];
  STATE.scheduleCycle++;

  const others = TEAM_LIST.filter(t=>t!==team);

  if(kind==="bilateral"){
    const opponent = pick(others);
    const mode = pick(["T20","T20","ODI"]);
    const host = chooseHost(team, [team, opponent]);
    STATE.currentEvent = { type:"bilateral", mode, opponent, host, teams:[team,opponent], matchesTotal:3, table:eventTableInit([team,opponent]), squad14:null, seriesCaptain:null };
    STATE.schedule = [ buildFixture("bilateral", mode, opponent, host, `1st ${mode} vs ${opponent}`) ];
    addNewsItem("result", `A new ${mode} series between ${team} and ${opponent} has been announced, hosted by ${host} — three matches, starting soon.`);
  } else if(kind==="tri"){
    const rivals = others.slice().sort(()=>Math.random()-0.5).slice(0,2);
    const mode = "T20";
    const teams = [team, ...rivals];
    const host = chooseHost(team, teams);
    STATE.currentEvent = { type:"tri", mode, teams, host, stage:"group", table:eventTableInit(teams), squad14:null, seriesCaptain:null };
    STATE.schedule = [ buildFixture("tri", mode, rivals[0], host, `Tri-Series vs ${rivals[0]}`) ];
    addNewsItem("result", `A Tri-Series featuring ${teams.join(", ")} has been announced, hosted by ${host}.`);
  } else {
    const isOdi = kind==="worldcup_odi";
    const mode = isOdi ? "ODI" : "T20";
    const cupName = isOdi ? "ODI World Cup" : "T20 World Cup";
    const rivals = others.slice().sort(()=>Math.random()-0.5).slice(0,5);
    const teams = [team, ...rivals];
    const host = chooseHost(team, teams);
    STATE.currentEvent = { type:"worldcup", cupName, mode, teams, host, stage:"group", table:eventTableInit(teams), userGroupMatches:rivals.slice(), aiGroupDone:false, squad14:null, seriesCaptain:null };
    STATE.schedule = [ buildFixture("worldcup", mode, rivals[0], host, `${cupName} — Group Match vs ${rivals[0]}`) ];
    addNewsItem("result", `The ${cupName} is here, hosted by ${host}! ${team} have been drawn in a group with ${rivals.join(", ")}. Top 4 advance to the semi-finals.`);
  }
  save();
}

function startCustomTournament(name, sponsor, teams, mode, matchesTotalIfSeries){
  const team = STATE.managedTeam;
  const host = chooseHost(team, teams);
  const label = sponsor ? `${name} (presented by ${sponsor})` : name;
  if(teams.length===2){
    const opponent = teams.find(t=>t!==team);
    STATE.currentEvent = { type:"custom", customKind:"series", name, sponsor, mode, opponent, host, teams, matchesTotal:matchesTotalIfSeries, table:eventTableInit(teams), squad14:null, seriesCaptain:null };
    STATE.schedule = [ buildFixture("custom", mode, opponent, host, `${name} — Match 1 vs ${opponent}`) ];
  } else {
    const rivals = teams.filter(t=>t!==team);
    STATE.currentEvent = { type:"custom", customKind:"roundrobin", name, sponsor, mode, teams, host, table:eventTableInit(teams), userGroupMatches:rivals.slice(), aiGroupDone:false, squad14:null, seriesCaptain:null };
    STATE.schedule = [ buildFixture("custom", mode, rivals[0], host, `${name} — vs ${rivals[0]}`) ];
  }
  addNewsItem("result", `${label} gets underway, hosted by ${host}! Teams: ${teams.join(", ")}.`);
  save();
}

function advanceSchedule(finishedFixture, winner){
  const ev = STATE.currentEvent;
  if(!ev){ generateNextEvent(); return; }
  const team = STATE.managedTeam;
  const opp = finishedFixture.opponent;
  eventRecordResult(ev.table, team, opp, winner===null?null:(winner===team?team:opp));

  if(ev.type==="bilateral"){
    const playedSoFar = ev.table[team].played;
    if(playedSoFar < ev.matchesTotal){
      const ord = ["1st","2nd","3rd"][playedSoFar] || (playedSoFar+1)+"th";
      STATE.schedule.push(buildFixture("bilateral", ev.mode, opp, ev.host, `${ord} ${ev.mode} vs ${opp}`));
    } else {
      const seriesWinner = ev.table[team].won>ev.table[opp].won ? team : ev.table[opp].won>ev.table[team].won ? opp : null;
      addNewsItem("result", seriesWinner ? `${seriesWinner} have won the ${ev.mode} series ${Math.max(ev.table[team].won,ev.table[opp].won)}-${Math.min(ev.table[team].won,ev.table[opp].won)}.` : `The series between ${team} and ${opp} finished level.`);
      STATE.currentEvent = null;
      generateNextEvent();
    }
  } else if(ev.type==="tri"){
    if(ev.stage==="group"){
      const rivals = ev.teams.filter(t=>t!==team);
      const nextOpp = rivals.find(t=>t!==opp);
      if(ev.table[team].played < 2){
        STATE.schedule.push(buildFixture("tri", ev.mode, nextOpp, ev.host, `Tri-Series vs ${nextOpp}`));
      } else {
        // simulate the AI-vs-AI group match, then move to final
        const aiRes = quickSimAI(rivals[0], rivals[1]);
        eventRecordResult(ev.table, rivals[0], rivals[1], aiRes.winner);
        addNewsItem("result", `Tri-Series: ${rivals[0]} ${aiRes.scoreA} vs ${rivals[1]} ${aiRes.scoreB}.`);
        postMatchSocial({team1:rivals[0], team2:rivals[1], winner:aiRes.winner, margin:`${aiRes.scoreA}-${aiRes.scoreB}`}, false);
        const finalists = eventTop(ev.table, 2);
        ev.stage = "final";
        ev.finalists = finalists;
        if(finalists.includes(team)){
          const finalOpp = finalists.find(t=>t!==team);
          STATE.schedule.push(buildFixture("tri", ev.mode, finalOpp, ev.host, `Tri-Series Final vs ${finalOpp}`));
        } else {
          const res = quickSimAI(finalists[0], finalists[1]);
          const champ = res.winner || finalists[0];
          addNewsItem("result", `${champ} have won the Tri-Series final, ${finalists[0]} ${res.scoreA} vs ${finalists[1]} ${res.scoreB}. ${team} were eliminated in the group stage.`);
          postMatchSocial({team1:finalists[0], team2:finalists[1], winner:champ, margin:`${res.scoreA}-${res.scoreB}`}, true);
          STATE.currentEvent = null;
          generateNextEvent();
        }
      }
    } else if(ev.stage==="final"){
      addNewsItem("result", `${winner || "No one"} won the Tri-Series final! A great tournament comes to a close.`);
      STATE.currentEvent = null;
      generateNextEvent();
    }
  } else if(ev.type==="worldcup"){
    if(ev.stage==="group"){
      if(ev.userGroupMatches.length>0){
        const nextOpp = ev.userGroupMatches.shift();
        STATE.schedule.push(buildFixture("worldcup", ev.mode, nextOpp, ev.host, `${ev.cupName} — Group Match vs ${nextOpp}`));
      } else {
        if(!ev.aiGroupDone){
          // Round-robin the remaining AI-only pairs among the other teams in the group
          const rivals = ev.teams.filter(t=>t!==team);
          for(let i=0;i<rivals.length;i++){
            for(let j=i+1;j<rivals.length;j++){
              const res = quickSimAI(rivals[i], rivals[j]);
              eventRecordResult(ev.table, rivals[i], rivals[j], res.winner);
              postMatchSocial({team1:rivals[i], team2:rivals[j], winner:res.winner, margin:`${res.scoreA}-${res.scoreB}`}, false);
            }
          }
          ev.aiGroupDone = true;
        }
        // Group stage complete — seed the top 4 into a knockout bracket: 1st vs 4th, 2nd vs 3rd.
        const top4 = eventTop(ev.table, 4);
        const pairs = [[top4[0], top4[3]], [top4[1], top4[2]]];
        ev.stage = "semis";
        ev.semiPairs = pairs;
        const userPair = pairs.find(pr=>pr.includes(team));
        if(userPair){
          const otherPair = pairs.find(pr=>pr!==userPair);
          const otherRes = quickSimAI(otherPair[0], otherPair[1]);
          ev.otherSemiWinner = otherRes.winner || otherPair[0];
          addNewsItem("result", `${ev.cupName} Semi-Final: ${otherPair[0]} ${otherRes.scoreA} vs ${otherPair[1]} ${otherRes.scoreB}. ${ev.otherSemiWinner} through to the final.`);
          postMatchSocial({team1:otherPair[0], team2:otherPair[1], winner:ev.otherSemiWinner, margin:`${otherRes.scoreA}-${otherRes.scoreB}`}, false);
          const semiOpp = userPair.find(t=>t!==team);
          STATE.schedule.push(buildFixture("worldcup", ev.mode, semiOpp, ev.host, `${ev.cupName} — Semi-Final vs ${semiOpp}`));
        } else {
          const res1 = quickSimAI(pairs[0][0], pairs[0][1]);
          const w1 = res1.winner || pairs[0][0];
          postMatchSocial({team1:pairs[0][0], team2:pairs[0][1], winner:w1, margin:`${res1.scoreA}-${res1.scoreB}`}, false);
          const res2 = quickSimAI(pairs[1][0], pairs[1][1]);
          const w2 = res2.winner || pairs[1][0];
          postMatchSocial({team1:pairs[1][0], team2:pairs[1][1], winner:w2, margin:`${res2.scoreA}-${res2.scoreB}`}, false);
          const finalRes = quickSimAI(w1, w2);
          const champ = finalRes.winner || w1;
          addNewsItem("result", `${champ} are ${ev.cupName} champions! ${w1} ${finalRes.scoreA} vs ${w2} ${finalRes.scoreB}. ${team} didn't make it out of the group stage.`);
          postMatchSocial({team1:w1, team2:w2, winner:champ, margin:`${finalRes.scoreA}-${finalRes.scoreB}`}, true);
          STATE.currentEvent = null;
          generateNextEvent();
        }
      }
    } else if(ev.stage==="semis"){
      if(winner===team){
        const finalOpp = ev.otherSemiWinner;
        ev.stage = "final";
        STATE.schedule.push(buildFixture("worldcup", ev.mode, finalOpp, ev.host, `${ev.cupName} — FINAL vs ${finalOpp}`));
      } else {
        const finalRes = quickSimAI(opp, ev.otherSemiWinner);
        const champ = finalRes.winner || opp;
        addNewsItem("result", `${champ} are ${ev.cupName} champions! ${opp} ${finalRes.scoreA} vs ${ev.otherSemiWinner} ${finalRes.scoreB}. ${team} were beaten in the semi-final.`);
        postMatchSocial({team1:opp, team2:ev.otherSemiWinner, winner:champ, margin:`${finalRes.scoreA}-${finalRes.scoreB}`}, true);
        STATE.currentEvent = null;
        generateNextEvent();
      }
    } else if(ev.stage==="final"){
      addNewsItem("result", `${winner ? winner+" are" : "No one is"} crowned ${ev.cupName} champion!`);
      STATE.currentEvent = null;
      generateNextEvent();
    }
  } else if(ev.type==="custom"){
    if(ev.customKind==="series"){
      const playedSoFar = ev.table[team].played;
      if(playedSoFar < ev.matchesTotal){
        STATE.schedule.push(buildFixture("custom", ev.mode, opp, ev.host, `${ev.name} — Match ${playedSoFar+1} vs ${opp}`));
      } else {
        const seriesWinner = ev.table[team].won>ev.table[opp].won ? team : ev.table[opp].won>ev.table[team].won ? opp : null;
        addNewsItem("result", seriesWinner ? `${seriesWinner} win the ${ev.name}!` : `${ev.name} ends level.`);
        STATE.currentEvent = null;
        generateNextEvent();
      }
    } else {
      // round-robin among 3+ user-chosen teams
      if(ev.userGroupMatches.length>0){
        const nextOpp = ev.userGroupMatches.shift();
        STATE.schedule.push(buildFixture("custom", ev.mode, nextOpp, ev.host, `${ev.name} — vs ${nextOpp}`));
      } else {
        if(!ev.aiGroupDone){
          const rivals = ev.teams.filter(t=>t!==team);
          for(let i=0;i<rivals.length;i++){
            for(let j=i+1;j<rivals.length;j++){
              const res = quickSimAI(rivals[i], rivals[j]);
              eventRecordResult(ev.table, rivals[i], rivals[j], res.winner);
              postMatchSocial({team1:rivals[i], team2:rivals[j], winner:res.winner, margin:`${res.scoreA}-${res.scoreB}`}, false);
            }
          }
          ev.aiGroupDone = true;
        }
        const champ = eventTop(ev.table,1)[0];
        addNewsItem("result", `${champ} win ${ev.name}${ev.sponsor?` (presented by ${ev.sponsor})`:""}!`);
        STATE.currentEvent = null;
        generateNextEvent();
      }
    }
  }
  save();
}

/* ===================== STATE ===================== */
let STATE = null; // whole game/save state
let SCREEN = "mainmenu";
let SCREEN_ARGS = {};
let MATCH = null; // live match object
let MATCH_TIMER = null;
let LAST_SCREEN = null; // used to suppress re-triggering the entrance animation on same-screen refreshes (e.g. auto-sim ticks)

function freshState(){
  return {
    profile:{ managerName:"Manager", founded: new Date().toISOString().slice(0,10) },
    managedTeam: null,
    squads: {}, // teamName -> [players]
    matchHistory: [], // completed match summaries
    newsFeed: [], // cricket news / fan reactions / expert notes
    schedule: [], // upcoming pre-fixed fixtures for the managed team
    currentEvent: null, // active series/tri-series/world cup context
    scheduleCycle: 0,
    finance: {},
    hallOfFame: [],
    releasedPlayers: {},
    lastXI: {},
    socialFeed: [],
    homeGround: {},
    currentYear: 2026,
    sponsors: {},
    records: null, // computed lazily
    settings: { commentaryDetail:"full" },
  };
}

function ensureSquads(){
  TEAM_LIST.forEach(t => { if(!STATE.squads[t]) STATE.squads[t] = generateSquad(t); });
  // Backward-compatibility: patch players saved by an older version of the game
  // that didn't have age/injury/form-trend fields yet.
  TEAM_LIST.forEach(t=>{
    STATE.squads[t].forEach(p=>{
      if(p.age===undefined) p.age = clamp(19 + Math.round((p.experience||0)/13) + randi(-2,3), 18, 39);
      if(!p.injury) p.injury = { injured:false, daysLeft:0, type:null };
      if(p.formTrend===undefined) p.formTrend = "flat";
      if(p.personalCoach===undefined) p.personalCoach = false;
      if(p.bowlSpecialty===undefined){
        if(p.bowlType==="pace") p.bowlSpecialty = pick(["Death Overs Specialist","Death Overs Specialist","Powerplay Specialist",null]);
        else if(p.bowlType==="spin") p.bowlSpecialty = pick(["Middle Overs Specialist","Middle Overs Specialist","Middle Overs Specialist",null]);
        else p.bowlSpecialty = null;
      }
    });
  });
  STATE.staff = STATE.staff || {};
  STATE.fanbase = STATE.fanbase || {};
  STATE.recentForm = STATE.recentForm || {};
  STATE.h2h = STATE.h2h || {};
  STATE._retirementQueue = STATE._retirementQueue || [];
  STATE.newsFeed = STATE.newsFeed || [];
  STATE.schedule = STATE.schedule || [];
  STATE.currentEvent = STATE.currentEvent || null;
  STATE.scheduleCycle = STATE.scheduleCycle || 0;
  STATE.finance = STATE.finance || {};
  STATE.hallOfFame = STATE.hallOfFame || [];
  STATE.releasedPlayers = STATE.releasedPlayers || {};
  STATE.lastXI = STATE.lastXI || {};
  STATE.socialFeed = STATE.socialFeed || [];
  STATE.homeGround = STATE.homeGround || {};
  if(STATE.currentYear===undefined) STATE.currentYear = 2026;
  STATE.sponsors = STATE.sponsors || {};
  if(STATE.staff){
    Object.keys(STATE.staff).forEach(team=>{
      const st = STATE.staff[team];
      COACH_ROLES.concat(["physio"]).forEach(role=>{
        if(!st[role]) st[role] = { ...genCoachCandidate(role), contractYears:3, yearsLeft:3, cost:0 };
        else {
          if(st[role].contractYears===undefined) st[role].contractYears = 3;
          if(st[role].yearsLeft===undefined) st[role].yearsLeft = 3;
          if(st[role].cost===undefined) st[role].cost = 0;
          if(st[role].role===undefined) st[role].role = role;
        }
      });
    });
  }
  if(STATE.managedTeam===undefined) STATE.managedTeam = null;
  if(STATE.managedTeam && !STATE._activeTeam) STATE._activeTeam = STATE.managedTeam;
  if(STATE.managedTeam && STATE.schedule.length===0 && !STATE.currentEvent){ generateNextEvent(); }
}

function save(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(STATE)); }catch(e){ console.error("save failed",e); }
}
function loadFromStorage(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}
function hasSave(){ return !!localStorage.getItem(SAVE_KEY); }

/* ===================== NAV ===================== */
function goto(screen, args){
  SCREEN = screen; SCREEN_ARGS = args || {};
  render();
  window.scrollTo(0,0);
}
function toast(msg){
  const t = el("div","toast",msg);
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

/* ===================== RENDER SHELL ===================== */
function render(){
  const app = $("#app");
  const sameScreen = (SCREEN === LAST_SCREEN);
  app.innerHTML = "";
  const header = el("header","topbar");
  const brand = el("div","brand", `<span class="seam"></span> CRICKET MANAGER <span class="mono">26</span>`);
  header.appendChild(brand);
  if(SCREEN !== "mainmenu"){
    const back = el("button","back-btn","Menu");
    back.onclick = ()=>{ if(MATCH){ if(!confirm("Leave match in progress? Progress in this match will be lost.")) return; stopMatchTimer(); MATCH=null; } goto("mainmenu"); };
    header.appendChild(back);
  } else {
    header.appendChild(el("div","sub", "SEASON " + new Date().getFullYear()));
  }
  app.appendChild(header);

  const main = el("main");
  const screenNode = SCREENS[SCREEN] ? SCREENS[SCREEN]() : el("div","screen","<p>Screen not found.</p>");
  if(sameScreen) screenNode.classList.add("noanim");
  main.appendChild(screenNode);
  app.appendChild(main);

  if(["squadHome","careerHub","training","staffHub","rivalries","playerStats","teamMaps","teamVenues","hallOfFame","scoutHub","droppedPlayers","socialLife","socialPlayers","socialPlayersTeam","selectHomeGround","hireCoach","sponsorsHub","signSponsor","createTournament"].includes(SCREEN)){
    app.appendChild(bottomNav());
  }
  LAST_SCREEN = SCREEN;
}

function bottomNav(){
  const nav = el("nav","bottomnav");
  const items = [["squadHome","Squad"],["careerHub","Team"],["training","Training"],["playerStats","Stats"]];
  items.forEach(([s,label])=>{
    const b = el("button", s===SCREEN?"active":"", label);
    b.onclick = ()=>goto(s, SCREEN_ARGS);
    nav.appendChild(b);
  });
  return nav;
}

function squadAvg(team){
  const sq = STATE.squads[team];
  const overall = sq.reduce((a,p)=>a+p.overall,0)/sq.length;
  return Math.round(overall);
}

      const available = prev.xi.filter(id=>{ const p=pool.find(x=>x.id===id); return p && !p.injury.injured; });

      goto("xiSelect14", SCREEN_ARGS);

};

/* =====================================================================
