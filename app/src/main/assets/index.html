const COMMENTARY = {
  dot: ["Good length, defended solidly.","Beaten on the outside edge — no run.","Blocked back to the bowler.","Worked to mid-on, no run.","Tight line, dot ball.","Left alone outside off.","Defended into the ground."],
  one:["Nudged into the gap for a single.","Quick single taken.","Pushed to mid-off, one run.","Worked off the pads for a single.","Driven softly, they cross for one."],
  two:["Driven into the gap, they come back for two.","Good running, two runs.","Cut away for a couple.","Placed past cover, two runs."],
  three:["Excellent running between the wickets, three runs.","Splits the field, three taken."],
  four:["Driven through covers for four!","Cracked through point for four.","Short ball pulled for four!","Elegant cover drive, races away for four.","Edged and fine for four.","Flicked off the pads, four runs.","Cut hard, finds the gap for four."],
  six:["Massive six over long-on!","Launched over the bowler's head for six!","Slog-swept for a huge six!","Smashed over deep midwicket for six!","Picked the gap and clears the rope with ease."],
  wicket_bowled:["Bowled him! Right through the gate.","Cleaned up! Timber!","Yorker does the damage — bowled!"],
  wicket_caught:["Caught! Skied it and taken comfortably.","Big shot, but well caught in the deep.","Caught behind! Given out.","Edged and taken at slip.","Miscued the pull, caught at deep midwicket."],
  wicket_lbw:["LBW! That looked plumb.","Struck on the pads — up goes the finger, LBW.","Trapped in front, LBW given."],
  wicket_runout:["Run out! Direct hit from the deep.","Short of the crease — run out!","Brilliant fielding, run out by a yard."],
  wicket_stumped:["Stumped! Quick work from the keeper.","Beaten and stumped in a flash."],
  wide:["Strays down the leg side, called wide.","Too wide, umpire signals a wide."],
  yorker_dot:["Excellent yorker. Dot ball.","Unplayable yorker, right on the money."],
};
function commentaryFor(kind){ return pick(COMMENTARY[kind] || ["Ball bowled."]); }

function buildBowlingOrder(xi){
  // players with role Bowler or All-Rounder, sorted by effective bowl skill desc
  return xi.filter(p=>p.role==="Bowler"||p.role==="All-Rounder").sort((a,b)=>b.bowlSkill-a.bowlSkill);
}

function newInningsState(battingXi, bowlingXi, maxOvers, target){
  return {
    battingXi, bowlingXi,
    runs:0, wickets:0, balls:0, extras:0,
    maxOvers, maxBalls: maxOvers ? maxOvers*6 : Infinity,
    target: target||null,
    striker:0, nonStriker:1, // indices into battingXi order
    order: battingXi.map(p=>p.id),
    bstats: {}, // id -> {runs,balls,fours,sixes,out,howOut}
    bowlerStats: {}, // id -> {balls,runs,wkts,maidenRunsThisOver}
    currentBowlerId: null,
    lastBowlerId: null,
    thisOverRuns: 0,
    fallOfWickets: [],
    partnership: { runs:0, balls:0 },
    log: [],
    done: false,
    resultNote: null,
  };
}
function ensureBstat(inn,id){ if(!inn.bstats[id]) inn.bstats[id]={runs:0,balls:0,fours:0,sixes:0,out:false,howOut:"",fiftyBall:null,hundredBall:null}; return inn.bstats[id]; }
function ensureBowlStat(inn,id){ if(!inn.bowlerStats[id]) inn.bowlerStats[id]={balls:0,runs:0,wkts:0,curOverRuns:0,maidens:0}; return inn.bowlerStats[id]; }

function pickNextBowler(inn){
  const bowlTeam = teamOfXi(inn.bowlingXi);
  const preset = MATCH.bowlingPreset && MATCH.bowlingPreset[bowlTeam];
  if(preset && preset.mode==="manual"){
    const phaseKey = phaseOf(inn);
    const designated = (preset[phaseKey]||[])
      .map(id=>inn.bowlingXi.find(p=>p.id===id))
      .filter(Boolean)
      .filter(p=>p.id!==inn.lastBowlerId);
    if(designated.length){
      const weights = designated.map(p=>[p.id, Math.max(5,p.bowlSkill)]);
      return weightedPick(weights);
    }
    // No valid designated bowler for this phase (e.g. all already bowled last over) — fall through to auto logic.
  }
  const pool = buildBowlingOrder(inn.bowlingXi).filter(p=>p.id!==inn.lastBowlerId);
  const use = pool.length? pool : buildBowlingOrder(inn.bowlingXi);
  // Weighted toward better bowlers, slight randomness
  const weights = use.map(p=>[p.id, Math.max(5,p.bowlSkill)]);
  return weightedPick(weights);
}

function phaseOf(inn){
  const overNow = Math.floor(inn.balls/6);
  const maxO = inn.maxOvers;
  if(!maxO || maxO===Infinity) return "middle";
  if(maxO<=20){ if(overNow<6) return "powerplay"; if(overNow>=maxO-4) return "death"; return "middle"; }
  if(maxO<=50){ if(overNow<10) return "powerplay"; if(overNow>=maxO-10) return "death"; return "middle"; }
  return "middle";
}

// The AI picks its own situational strategy every ball rather than sharing a single
// global value with the human manager — this is what previously made the AI's batting
// collapse or its bowling look unbeatable, since whichever strategy the user last set
// for their own turn was silently carrying over onto the AI's turn too.
function aiBattingStrategy(inn){
  const phase = phaseOf(inn);
  if(inn.target){
    const remBalls = inn.maxBalls - inn.balls, remRuns = inn.target - inn.runs;
    const rrr = remBalls>0 ? (remRuns/remBalls*6) : 99;
    if(remRuns<=0) return "Balanced";
    if(rrr>10) return "Ultra Aggressive";
    if(rrr>7) return "Aggressive";
    if(rrr<4 && inn.wickets<6) return "Defensive";
    return "Balanced";
  }
  if(phase==="death") return "Aggressive";
  if(inn.wickets>=7) return "Defensive";
  return "Balanced";
}
function aiBowlingStrategy(inn){
  const phase = phaseOf(inn);
  if(inn.target){
    const remBalls = inn.maxBalls - inn.balls, remRuns = inn.target - inn.runs;
    const rrr = remBalls>0 ? (remRuns/remBalls*6) : 99;
    if(rrr<5) return "Attacking";
    return "Balanced";
  }
  if(phase==="death") return "Attacking";
  if(inn.wickets<=2 && phase==="powerplay") return "Attacking";
  return "Balanced";
}
function effectiveBattingStrategy(inn){
  return inn.battingXi===MATCH.userXi ? MATCH.userBattingStrategy : aiBattingStrategy(inn);
}
function effectiveBowlingStrategy(inn){
  return inn.bowlingXi===MATCH.userXi ? MATCH.userBowlingStrategy : aiBowlingStrategy(inn);
}

function simulateBall(inn, conditions, battingStrategy, bowlingStrategy){
  if(inn.currentBowlerId===null){
    inn.currentBowlerId = pickNextBowler(inn);
    inn.thisOverRuns = 0;
  }
  const strikerP = inn.battingXi[inn.striker];
  const bowlerP = inn.bowlingXi.find(p=>p.id===inn.currentBowlerId);
  const bstat = ensureBstat(inn, strikerP.id);
  const bowlStat = ensureBowlStat(inn, bowlerP.id);

  let effBat = strikerP.batSkill * formMultiplier(strikerP.form) * fitnessMultiplier(strikerP.fitness);
  let effBowl = bowlerP.bowlSkill * formMultiplier(bowlerP.form) * fitnessMultiplier(bowlerP.fitness);
  effBat += staffBattingBonus(teamOfXi(inn.battingXi));
  effBowl += staffBowlingBonus(teamOfXi(inn.bowlingXi));
  effBat += staffAssistantBonus(teamOfXi(inn.battingXi));
  effBat += sponsorBattingBonus(teamOfXi(inn.battingXi));
  effBowl += staffAssistantBonus(teamOfXi(inn.bowlingXi));

  // pitch matchup
  const pitch = conditions.pitch;
  if(pitch==="Batting Friendly") effBat += 6;
  if(pitch==="Pace Friendly" && bowlerP.bowlType==="pace") effBowl += 7;
  if(pitch==="Spin Friendly" && bowlerP.bowlType==="spin") effBowl += 7;
  if(conditions.weather==="Rain Threat" && bowlerP.bowlType==="pace") effBowl += 3;
  if(conditions.weather==="Windy" && bowlerP.bowlType==="spin") effBowl -= 2;
  // Day/night dew: makes the ball skid on for batters and harder to grip for bowlers, especially spinners, in the second innings.
  if(conditions.session==="Day/Night" && inn.target){
    effBat += 3;
    if(bowlerP.bowlType==="spin") effBowl -= 3;
  }

  const phase = phaseOf(inn);
  let boundaryBoost = 0, wicketBoost = 0;
  boundaryBoost -= staffFieldingBonus(teamOfXi(inn.bowlingXi));
  if(phase==="powerplay") boundaryBoost += 3;
  if(phase==="death"){ boundaryBoost += 6; wicketBoost += 2; }
  // Phase specialists earn their tag: a bowler bowling in their specialty phase gets a real edge.
  if(bowlerP.bowlSpecialty==="Death Overs Specialist" && phase==="death") effBowl += 4;
  if(bowlerP.bowlSpecialty==="Middle Overs Specialist" && phase==="middle") effBowl += 3;
  if(bowlerP.bowlSpecialty==="Powerplay Specialist" && phase==="powerplay") effBowl += 3;
  // ODIs are a longer game — batters build an innings and rotate the strike through the middle overs
  // rather than attacking every ball the way a T20 lineup would.
  if(MATCH.mode==="ODI" && phase==="middle"){ boundaryBoost -= 4; }

  const stratMap = {Defensive:-6, Balanced:0, Aggressive:6, "Ultra Aggressive":13};
  const bStrat = stratMap[battingStrategy] ?? 0;
  boundaryBoost += bStrat*0.9;
  wicketBoost += Math.max(0,bStrat)*0.4;
  if(bStrat<0) wicketBoost -= 1.5;

  const bowlStratMap = {Defensive:-4, Balanced:0, Attacking:6};
  const bwStrat = bowlStratMap[bowlingStrategy] ?? 0;
  wicketBoost += bwStrat*0.35;
  if(bwStrat<0) boundaryBoost -= 2; else boundaryBoost += bwStrat*0.4;

  // required run rate pressure (chasing)
  if(inn.target){
    const remBalls = inn.maxBalls - inn.balls;
    const remRuns = inn.target - inn.runs;
    if(remBalls>0){
      const reqRR = (remRuns/remBalls)*6;
      if(reqRR>10){ boundaryBoost += 5; wicketBoost += 2; }
      else if(reqRR<4){ boundaryBoost -= 3; }
    }
  }

  const edge = clamp((effBat - effBowl)/50, -1, 1); // -1 bowler dominant .. 1 batter dominant

  // wide chance
  if(Math.random() < 0.028){
    inn.runs += 1; inn.extras += 1; bowlStat.runs += 1; bowlStat.curOverRuns += 1; inn.thisOverRuns += 1;
    inn.log.push({tag:"WD", text: commentaryFor("wide"), cls:""});
    return {consumesBall:false, over:false};
  }

  // Base outcome weights. ODI gets its own profile rather than a scaled-down T20 one — a 50-over
  // innings needs a meaningfully lower per-ball scoring AND wicket rate to land around a realistic
  // 240-290 with ~7 wickets down, instead of either collapsing early or racing to 350+.
  let w;
  if(MATCH.mode==="ODI"){
    const bb = boundaryBoost*0.5, wb = wicketBoost*0.5;
    w = {
      0: 45 - edge*6 + Math.max(0,-bb)*0.6,
      1: 25,
      2: 7,
      3: 1.5,
      4: 7 + edge*5 + bb,
      6: 2 + edge*3 + Math.max(0,bb-2),
      W: 2.4 - edge*1.2 + wb*0.5,
    };
  } else {
    w = {
      0: 34 - edge*8 + Math.max(0,-boundaryBoost)*0.5,
      1: 29,
      2: 9,
      3: 2,
      4: 13 + edge*7 + boundaryBoost,
      6: 6 + edge*5 + Math.max(0,boundaryBoost-3),
      W: 3.2 - edge*1.8 + wicketBoost*0.4,
    };
  }
  Object.keys(w).forEach(k=>w[k]=Math.max(0.4,w[k]));

  const outcome = weightedPick(Object.entries(w).map(([k,v])=>[k, v]));

  let entry = {tag:"", text:"", cls:""};
  inn.balls++; bowlStat.balls++; bstat.balls++;

  if(outcome==="W"){
    const wtype = weightedPick([["bowled",30],["caught",42],["lbw",16],["runout",8],["stumped", strikerP.role==="Wicketkeeper"?2:6]]);
    bstat.out = true;
    bstat.howOut = wtype;
    bowlStat.wkts += (wtype!=="runout") ? 1 : 0;
    inn.wickets++;
    inn.fallOfWickets.push({runs: inn.runs, wkt: inn.wickets, batter: strikerP.name, over: (Math.floor(inn.balls/6)) + "." + (inn.balls%6)});
    entry = {tag:"W", text: `${strikerP.name} — ${commentaryFor("wicket_"+wtype)}`, cls:"wkt"};
    if(bowlStat.wkts===5){ entry.text += ` — FIVE-WICKET HAUL for ${bowlerP.name}!`; entry.cls = "milestone"; }
    bowlStat.curOverRuns += 0;
    advanceAfterWicket(inn);
    inn.partnership = { runs:0, balls:0 };
  } else {
    const runs = parseInt(outcome,10);
    inn.runs += runs; bstat.runs += runs; bowlStat.runs += runs; bowlStat.curOverRuns += runs;
    inn.partnership.runs += runs; inn.partnership.balls += 1;
    if(runs===4){ bstat.fours++; entry={tag:"4", text: `${strikerP.name} — ${commentaryFor("four")}`, cls:"four"}; }
    else if(runs===6){ bstat.sixes++; entry={tag:"6", text: `${strikerP.name} — ${commentaryFor("six")}`, cls:"six"}; }
    else if(runs===0){ entry={tag:"·", text: commentaryFor("dot"), cls:""}; }
    else { entry={tag:String(runs), text: commentaryFor(runs===1?"one":runs===2?"two":"three"), cls:""}; }
    // milestones
    if(bstat.runs>=50 && bstat.fiftyBall===null){ bstat.fiftyBall = bstat.balls; entry.text += ` — FIFTY for ${strikerP.name}! The crowd rises to applaud.`; entry.cls = "milestone"; }
    if(bstat.runs>=100 && bstat.hundredBall===null){ bstat.hundredBall = bstat.balls; entry.text += ` — HUNDRED for ${strikerP.name}! A magnificent century, bat raised to the dressing room.`; entry.cls = "milestone"; }
    if(runs%2===1){ [inn.striker, inn.nonStriker] = [inn.nonStriker, inn.striker]; }
  }
  inn.log.push(entry);
  inn.thisOverRuns += 0;

  const overComplete = inn.balls % 6 === 0;
  let overEnded = false;
  if(overComplete && !inn.done){
    if(bowlStat.curOverRuns===0) bowlStat.maidens++;
    bowlStat.curOverRuns = 0;
    [inn.striker, inn.nonStriker] = [inn.nonStriker, inn.striker];
    inn.lastBowlerId = inn.currentBowlerId;
    inn.currentBowlerId = null;
    overEnded = true;
  }
  return {consumesBall:true, over:overEnded, wicket: outcome==="W"};
}

function advanceAfterWicket(inn){
  // find next available batter not out and not currently in
  const inXi = [inn.striker, inn.nonStriker];
  const nextIdx = inn.battingXi.findIndex((p,i)=> !inXi.includes(i) && !(ensureBstat(inn,p.id).out) && i!==inn.striker);
  if(nextIdx>-1){ inn.striker = nextIdx; }
}

function inningsAllOut(inn){ return inn.wickets >= 10; }
function inningsOversDone(inn){ return inn.maxBalls!==Infinity && inn.balls >= inn.maxBalls; }
function inningsChaseWon(inn){ return inn.target!=null && inn.runs >= inn.target; }
function inningsOver(inn){ return inningsAllOut(inn) || inningsOversDone(inn) || inningsChaseWon(inn); }

/* ---------- MATCH LIFECYCLE ---------- */
function startMatch(args, battingFirstTeam){
  const {mode, userTeam, oppTeam, _venue, _conditions, _captain} = args;
  const userSquad = STATE.squads[userTeam];
  const oppSquad = STATE.squads[oppTeam];
  const userXiIds = args._xi;
  const userXi = userXiIds.map(id=>userSquad.find(p=>p.id===id));
  const oppXi = pickAiXi(oppSquad);

  const maxOvers = mode==="T20" ? 20 : 50;

  MATCH = {
    mode, userTeam, oppTeam, venue:_venue, conditions:_conditions,
    userXi, oppXi, userCaptain: _captain,
    battingFirstTeam,
    fixtureRef: args._fixture || null,
    bowlingPreset: { [userTeam]: args._bowlingPreset || { mode:"auto" } },
    innings: [],
    currentInningsIdx: 0,
    maxOvers,
    userBattingStrategy: "Balanced",
    userBowlingStrategy: "Balanced",
    userIsBatting: battingFirstTeam===userTeam,
    paused: true,
    autoSpeed: null,
    autoSpeedMult: 1,
    finished: false,
    resultSummary: null,
    rainHappened: false,
  };
  const firstBatXi = battingFirstTeam===userTeam ? userXi : oppXi;
  const firstBowlXi = battingFirstTeam===userTeam ? oppXi : userXi;
  MATCH.innings.push(newInningsState(firstBatXi, firstBowlXi, maxOvers, null));
  MATCH.userIsBatting = battingFirstTeam===userTeam;
  goto("matchLive");
}

function pickAiXi(squad){
  // AI picks best 11 by overall from available (non-injured) players, ensuring 1 keeper and 5+ bowling options
  const available = squad.filter(p=>!p.injury.injured);
  const pool = available.length>=11 ? available : squad; // safety net if too many injuries at once
  const keepers = pool.filter(p=>p.role==="Wicketkeeper").sort((a,b)=>b.overall-a.overall);
  const bowlers = pool.filter(p=>p.role==="Bowler").sort((a,b)=>b.overall-a.overall);
  const allr = pool.filter(p=>p.role==="All-Rounder").sort((a,b)=>b.overall-a.overall);
  const bats = pool.filter(p=>p.role==="Batter").sort((a,b)=>b.overall-a.overall);
  const xi = [];
  xi.push(keepers[0] || pool[0]);
  xi.push(...bats.slice(0,5));
  xi.push(...allr.slice(0,3));
  xi.push(...bowlers.slice(0,4));
  return xi.filter(Boolean).slice(0,11).sort((a,b)=>b.batSkill-a.batSkill);
}

// Auto Pick (strongest XI/squad) helpers used by the manual/auto buttons on selection screens.
function fillToCount(combined, pool, count){
  const seen = new Set(combined.map(p=>p.id));
  const rest = pool.filter(p=>!seen.has(p.id)).sort((a,b)=>b.overall-a.overall);
  while(combined.length<count && rest.length) combined.push(rest.shift());
  return combined.slice(0,count);
}
function autoPickStrongestXI(pool){
  const avail = pool.filter(p=>!p.injury.injured);
  const usable = avail.length>=11 ? avail : pool;
  const keepers = usable.filter(p=>p.role==="Wicketkeeper").sort((a,b)=>b.overall-a.overall);
  const bowlers = usable.filter(p=>p.role==="Bowler").sort((a,b)=>b.overall-a.overall);
  const allr = usable.filter(p=>p.role==="All-Rounder").sort((a,b)=>b.overall-a.overall);
  const bats = usable.filter(p=>p.role==="Batter").sort((a,b)=>b.overall-a.overall);
  let xi = [keepers[0], ...bats.slice(0,5), ...allr.slice(0,3), ...bowlers.slice(0,4)].filter(Boolean);
  xi = fillToCount(xi, usable, 11);
  return xi.map(p=>p.id);
}
function autoPickStrongestSquad14(pool){
  const avail = pool.filter(p=>!p.injury.injured);
  const usable = avail.length>=14 ? avail : pool;
  const keepers = usable.filter(p=>p.role==="Wicketkeeper").sort((a,b)=>b.overall-a.overall);
  const bowlers = usable.filter(p=>p.role==="Bowler").sort((a,b)=>b.overall-a.overall);
  const allr = usable.filter(p=>p.role==="All-Rounder").sort((a,b)=>b.overall-a.overall);
  const bats = usable.filter(p=>p.role==="Batter").sort((a,b)=>b.overall-a.overall);
  let squad14 = [...keepers.slice(0,2), ...bats.slice(0,6), ...allr.slice(0,3), ...bowlers.slice(0,5)].filter(Boolean);
  squad14 = fillToCount(squad14, usable, 14);
  return squad14.map(p=>p.id);
}

function currentInnings(){ return MATCH.innings[MATCH.currentInningsIdx]; }

function isUserBattingNow(){
  const inn = currentInnings();
  return inn.battingXi === MATCH.userXi;
}
function isUserBowlingNow(){ return !isUserBattingNow(); }

function stopMatchTimer(){ if(MATCH_TIMER){ clearInterval(MATCH_TIMER); MATCH_TIMER=null; } if(MATCH) MATCH.autoSpeed=null; }

function endCurrentInnings(){
  stopMatchTimer();
  const inn = currentInnings();
  inn.done = true;

  // Two-innings limited-overs format: after innings 1, start the chase with a target.
  if(MATCH.innings.length===1){
    const bowlingFirstXi = inn.battingXi; // now bowls
    const battingSecondXi = inn.bowlingXi; // now bats
    const inn2 = newInningsState(battingSecondXi, bowlingFirstXi, MATCH.maxOvers, inn.runs+1);
    MATCH.innings.push(inn2);
    MATCH.currentInningsIdx = 1;
    toast(`Innings break. Target: ${inn.runs+1}`);
    render();
    return;
  }
  finishMatch();
}

function computeMOM(){
  const all = [...MATCH.userXi, ...MATCH.oppXi];
  let best=null, bestScore=-1;
  MATCH.innings.forEach(inn=>{
    all.forEach(p=>{
      const bs = inn.bstats[p.id]; const bw = inn.bowlerStats[p.id];
      let score=0;
      if(bs) score += bs.runs + bs.fours*0.5 + bs.sixes*1;
      if(bw) score += bw.wkts*22 - bw.runs*0.1;
      if(score>bestScore){ bestScore=score; best=p; }
    });
  });
  return best;
}

function finishMatch(){
  stopMatchTimer();
  MATCH.finished = true;
  let winner=null, margin="", draw=false;
  const inn1 = MATCH.innings[0], inn2 = MATCH.innings[1];
  if(inn2.runs > inn1.runs){ winner = teamOfXi(inn2.battingXi); margin = `won by ${10-inn2.wickets} wickets`; }
  else if(inn2.runs < inn1.runs){ winner = teamOfXi(inn1.battingXi); margin = `won by ${inn1.runs-inn2.runs} runs`; }
  else { winner = null; margin = "Match Tied"; }
  const mom = computeMOM();
  const team1 = MATCH.battingFirstTeam, team2 = MATCH.battingFirstTeam===MATCH.userTeam?MATCH.oppTeam:MATCH.userTeam;
  const result = { mode:MATCH.mode, team1, team2,
    winner, margin, draw, mom: mom?mom.name:"-", venue: MATCH.venue.name, date:new Date().toISOString(),
    scores: MATCH.innings.map(i=>({team:teamOfXi(i.battingXi), runs:i.runs, wkts:i.wickets, overs:(Math.floor(i.balls/6))+"."+(i.balls%6)})) };
  result.analysis = generateExpertAnalysis(result, mom);
  if(result.winner && result.winner!==MATCH.userTeam) result.whatWentWrong = generateWhatWentWrong();
  MATCH.resultSummary = result;
  result.formChanges = applyCareerUpdates();
  updateRecentForm(team1, team2, winner);
  updateRivalry(team1, team2, winner);
  updateFanbase(team1, team2, winner, result);
  updateFinance(team1, team2, winner, result);
  tickInjuries();
  STATE.matchHistory.push(result);
  ageUpSeasonIfDue();

  const headline = result.draw || !result.winner
    ? `${team1} and ${team2} played out a tied finish at ${result.venue}.`
    : `${result.winner} beat ${result.winner===team1?team2:team1} ${result.margin} at ${result.venue}.`;
  addNewsItem("result", headline);
  addNewsItem("fan", generateFanReaction(result));
  addNewsItem("expert", result.analysis.split(". ")[0] + ".");
  if(result.winner===MATCH.userTeam){
    result.partyText = generatePartyText(MATCH.userTeam);
    addNewsItem("fan", result.partyText);
  }
  const isFinalFixture = MATCH.fixtureRef && /final/i.test(MATCH.fixtureRef.label);
  postMatchSocial(result, isFinalFixture);

  if(MATCH.fixtureRef){
    STATE.schedule = STATE.schedule.filter(f=>f.id!==MATCH.fixtureRef.id);
    advanceSchedule(MATCH.fixtureRef, winner);
  }

  save();
  goto("presentation");
}

function teamOfXi(xi){ return xi===MATCH.userXi ? MATCH.userTeam : MATCH.oppTeam; }

const INJURY_TYPES = ["Hamstring strain","Side strain","Ankle sprain","Back spasm","Finger fracture","Quad strain","Shoulder niggle","Knee soreness"];

function applyCareerUpdates(){
  const formChanges = { up:[], down:[] };
  const sides = [[MATCH.userXi, MATCH.userTeam], [MATCH.oppXi, MATCH.oppTeam]];
  sides.forEach(([xi, team])=>{
    const physioRating = staffPhysioRating(team);
    xi.forEach(p=>{
      let played=false, runsMade=0, wktsTaken=0, ballsFaced=0, ballsBowled=0, runsConceded=0, bestVal=-1;
      MATCH.innings.forEach(inn=>{
        const bs = inn.bstats[p.id]; const bw = inn.bowlerStats[p.id];
        if(bs){ played=true; runsMade+=bs.runs; ballsFaced+=bs.balls;
          if(bs.runs>p.career.highScore) p.career.highScore=bs.runs;
          if(bs.runs>=100) p.career.hundreds++; else if(bs.runs>=50) p.career.fifties++;
          if(bs.hundredBall!==null && bs.hundredBall<p.career.fastestHundred) p.career.fastestHundred=bs.hundredBall;
          if(bs.fiftyBall!==null && bs.fiftyBall<p.career.fastestFifty) p.career.fastestFifty=bs.fiftyBall;
        }
        if(bw){ played=true; wktsTaken+=bw.wkts; ballsBowled+=bw.balls; runsConceded+=bw.runs;
          const val = bw.wkts*1000 - bw.runs;
          if(val>bestVal){ bestVal=val; }
        }
      });
      if(!played) return;

      p.career.matches++; p.career.runs+=runsMade; p.career.balls+=ballsFaced;
      p.career.wickets+=wktsTaken; p.career.ballsBowled+=ballsBowled; p.career.runsConceded+=runsConceded;
      if(wktsTaken>=5) p.career.fiveFor++;
      const [pw,pr] = (p.career.bestBowling||"0/0").split("/").map(Number);
      if(wktsTaken>pw || (wktsTaken===pw && bestVal>-Infinity && (runsConceded<pr||pr===0))){
        if(wktsTaken>0) p.career.bestBowling = wktsTaken+"/"+runsConceded;
      }
      p.experience++;
      p.fitness = clamp(p.fitness - randi(1,4), 55, 100);

      // ---- form update (performance, then age can drag it back down) ----
      const prevIdx = FORM_TIERS.indexOf(p.form);
      let idx = prevIdx;
      const battedWell = runsMade >= 40 || (ballsFaced>0 && runsMade/Math.max(1,ballsFaced) > 1.1);
      const bowledWell = wktsTaken>=2 || (ballsBowled>0 && (runsConceded/(ballsBowled/6 || 1)) < 5.5);
      if(battedWell || bowledWell) idx = Math.min(4, idx+1);
      else if(runsMade!==0 || wktsTaken!==0 || ballsFaced>4 || ballsBowled>4){
        const badly = (ballsFaced>6 && runsMade/Math.max(1,ballsFaced)<0.5) || (ballsBowled>12 && (runsConceded/(ballsBowled/6))>9);
        if(badly) idx = Math.max(0, idx-1);
      }
      // Veterans (35+) risk a further age-related dip in form, independent of that day's performance.
      if(p.age>=35){
        const ageDeclineChance = clamp((p.age-34)*0.05, 0, 0.3);
        if(Math.random() < ageDeclineChance) idx = Math.max(0, idx-1);
      }
      // A personal coach nudges a struggling player upward slowly, match by match.
      if(p.personalCoach && idx<=1 && Math.random()<0.3){
        idx = Math.min(idx+1, 4);
      }
      if(p.personalCoach && idx>=2){
        p.personalCoach = false; // mission accomplished — back to a healthy form tier
        addNewsItem("result", `${p.name}'s form has recovered — the personal coaching arrangement with ${team} has ended.`);
      }
      p.form = FORM_TIERS[idx];
      p.formTrend = idx>prevIdx ? "up" : idx<prevIdx ? "down" : "flat";
      if(idx>prevIdx) formChanges.up.push({ name:p.name, team });
      else if(idx<prevIdx) formChanges.down.push({ name:p.name, team });

      // ---- injury chance, reduced by a good physio ----
      const injuryChance = clamp(0.025 - (physioRating-70)/3500 - sponsorInjuryReduction(team), 0.006, 0.05);
      if(!p.injury.injured && Math.random() < injuryChance){
        const recoveryCut = physioRating>=85 ? 1 : 0;
        p.injury = { injured:true, daysLeft: Math.max(1, randi(1,4)-recoveryCut), type: pick(INJURY_TYPES) };
      }
    });
  });
  return formChanges;
}

function retirePlayerNow(team, player){
  STATE._retirementQueue = STATE._retirementQueue || [];
  STATE._retirementQueue.push({
    team, name:player.name, role:player.role, age:player.age,
    career: {...player.career},
    fanbaseAtRetirement: ensureFanbase(team),
    voluntary: true,
  });
  addNewsItem("retirement", `${player.name} (${team}) has announced their retirement from professional cricket after ${player.career.matches} matches.`);
  addToHallOfFame({ team, name:player.name, role:player.role, age:player.age, career:{...player.career} });
  retireTweet(player, team);
  const sq = STATE.squads[team];
  const idx = sq.findIndex(x=>x.id===player.id);
  const used = new Set(sq.map(x=>x.name));
  sq[idx] = genPlayer(team, player.role, used, TIER_RANGE[TIER[team]]);
  save();
}

function dropPlayerNow(team, player){
  const sq = STATE.squads[team];
  const idx = sq.findIndex(x=>x.id===player.id);
  sq.splice(idx, 1);
  releasePlayer(team, player);
  addNewsItem("result", `${team} have dropped ${player.name} from the squad — a replacement is needed.`);
  if(player.career.matches>0){ addNewsItem("reaction", generateDropReaction(player.name, "angry")); dropTweet(player, team); }
  save();
}
function fillVacancy(team, player){
  STATE.squads[team].push(player);
  if(STATE.releasedPlayers[team]) STATE.releasedPlayers[team] = STATE.releasedPlayers[team].filter(x=>x.id!==player.id);
  save();
}

function ageUpSeasonIfDue(){
  // Roughly once every 10 matches managed, a "season" passes and every player ages a year.
  if(STATE.matchHistory.length>0 && STATE.matchHistory.length % 10 === 0){
    TEAM_LIST.forEach(team=>{
      STATE.squads[team].forEach(p=>{ p.age += 1; });
    });
    tickCoachContracts();
    tickSponsorContracts();
    STATE.currentYear = (STATE.currentYear||2026) + 1;
    addNewsItem("result", `A new season begins — welcome to ${STATE.currentYear}! Every player is a year older.`);
  }
}

function tickInjuries(){
  // Time passes for every squad, not just the two that just played.
  TEAM_LIST.forEach(team=>{
    if(!STATE.squads[team]) return;
    const physioRating = staffPhysioRating(team);
    const fastRecovery = physioRating>=85;
    STATE.squads[team].forEach(p=>{
      if(p.injury.injured){
        p.injury.daysLeft -= fastRecovery ? 2 : 1;
        if(p.injury.daysLeft<=0){ p.injury = { injured:false, daysLeft:0, type:null }; }
      }
    });
  });
}

/* ===================== RAIN DELAY / DLS ===================== */
function dlsResourcePercent(oversRemaining, maxOvers, wicketsLost){
  const oversFactor = Math.pow(clamp(oversRemaining/Math.max(1,maxOvers),0,1), 0.85);
  const wicketFactor = 1 - (Math.min(wicketsLost,9)*0.075);
  return clamp(oversFactor*wicketFactor, 0.02, 1);
}
function maybeTriggerRain(inn){
  if(MATCH.rainHappened) return false;
  if(!MATCH.conditions || MATCH.conditions.weather!=="Rain Threat") return false;
  if(inn.balls < 12) return false;
  if((inn.maxBalls - inn.balls) < 12) return false;
  return Math.random() < 0.003;
}
function applyRainDelay(inn){
  MATCH.rainHappened = true;
  const isFirstInnings = MATCH.innings.indexOf(inn)===0 && !inn.target;
  const oversLost = randi(2,5);
  const oversCompleted = Math.floor(inn.balls/6);
  if(isFirstInnings){
    const newMax = Math.max(oversCompleted+1, MATCH.maxOvers - oversLost);
    MATCH.maxOvers = newMax;
    inn.maxOvers = newMax; inn.maxBalls = newMax*6;
    const text = `Rain has stopped play! The match has been reduced to ${newMax} overs per side.`;
    inn.log.push({tag:"RAIN", text, cls:"milestone"});
    MATCH._rainNote = text;
  } else {
    const newMax = Math.max(oversCompleted+1, inn.maxOvers - oversLost);
    const oversRemainingAfter = newMax - oversCompleted;
    const resource2 = dlsResourcePercent(oversRemainingAfter, newMax, inn.wickets);
    const inn1 = MATCH.innings[0];
    let newTarget = Math.ceil(inn1.runs * resource2) + 1;
    newTarget = Math.max(newTarget, inn.runs+1);
    inn.maxOvers = newMax; inn.maxBalls = newMax*6;
    inn.target = newTarget;
    const text = `Rain has stopped play! DLS method applied — revised target is ${newTarget} from ${newMax} overs.`;
    inn.log.push({tag:"RAIN", text, cls:"milestone"});
    MATCH._rainNote = text;
  }
}
function advanceOneBall(inn){
  if(maybeTriggerRain(inn)){ applyRainDelay(inn); return {rain:true}; }
  return simulateBall(inn, MATCH.conditions, effectiveBattingStrategy(inn), effectiveBowlingStrategy(inn));
}

function playBalls(n){
  const inn = currentInnings();
  if(inn.done || MATCH.finished) return;
  for(let i=0;i<n;i++){
    if(inn.done) break;
    const r = advanceOneBall(inn);
    if(r && r.rain){ stopMatchTimer(); toast(MATCH._rainNote); render(); return; }
    if(inningsOver(inn)){ endCurrentInnings(); return; }
  }
  render();
}
function playUntil(stopCond){
  const startInn = currentInnings();
  let guard=0;
  while(guard++<400){
    if(MATCH.finished) break;
    const inn = currentInnings();
    if(inn.done) break;
    const r = advanceOneBall(inn);
    if(r && r.rain){ stopMatchTimer(); toast(MATCH._rainNote); render(); return; }
    if(inningsOver(inn)){ endCurrentInnings(); break; }
    if(stopCond()) break;
  }
  render();
}
function fastForwardInnings(){
  let guard=0;
  const inn = currentInnings();
  while(guard++<1500){
    if(inn.done) break;
    advanceOneBall(inn);
    if(inningsOver(inn)) break;
  }
  if(inningsOver(inn)) endCurrentInnings(); else render();
}
function startAutoTimer(){
  const baseMs = 550;
  const intervalMs = Math.max(60, Math.round(baseMs / (MATCH.autoSpeedMult||1)));
  MATCH.autoSpeed = intervalMs;
  MATCH_TIMER = setInterval(()=>{
    if(MATCH.finished || !MATCH){ stopMatchTimer(); return; }
    const inn = currentInnings();
    if(inn.done) return;
    const r = advanceOneBall(inn);
    if(r && r.rain){ stopMatchTimer(); toast(MATCH._rainNote); render(); return; }
    if(inningsOver(inn)){ endCurrentInnings(); return; }
    render();
  }, intervalMs);
}
function toggleAuto(){
  if(MATCH.autoSpeed){ stopMatchTimer(); MATCH.autoSpeed=null; render(); return; }
  MATCH.autoSpeedMult = MATCH.autoSpeedMult || 1;
  startAutoTimer();
  render();
}
function setAutoSpeed(mult){
  MATCH.autoSpeedMult = mult;

  MATCH.innings.forEach((inn,idx)=>{

function scorecardBlock(inn, idx){
  const team = teamOfXi(inn.battingXi);
  const wrap = el("div","card");
  wrap.appendChild(el("h3", null, `Innings ${idx+1} — ${team} ${inn.runs}/${inn.wickets} (${Math.floor(inn.balls/6)}.${inn.balls%6} ov)`));
  const table = el("table","stattable");
  table.innerHTML = `<tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr>`;
  inn.battingXi.forEach(p=>{
    const bs = inn.bstats[p.id];
    if(!bs) return;
    const sr = bs.balls>0 ? (bs.runs/bs.balls*100).toFixed(1) : "0.0";
    const tr = el("tr", bs.out?"out":"");
    tr.innerHTML = `<td>${p.name}${bs.out?"":" *"}</td><td>${bs.runs}</td><td>${bs.balls}</td><td>${bs.fours}</td><td>${bs.sixes}</td><td>${sr}</td>`;
    table.appendChild(tr);
  });
  wrap.appendChild(table);
  const btable = el("table","stattable");
  btable.innerHTML = `<tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Econ</th></tr>`;
  inn.bowlingXi.forEach(p=>{
    const bw = inn.bowlerStats[p.id];
    if(!bw) return;
    const overs = Math.floor(bw.balls/6)+"."+(bw.balls%6);
    const econ = bw.balls>0 ? (bw.runs/(bw.balls/6)).toFixed(2) : "0.00";
    const tr = el("tr");
    tr.innerHTML = `<td>${p.name}</td><td>${overs}</td><td>${bw.maidens}</td><td>${bw.runs}</td><td>${bw.wkts}</td><td>${econ}</td>`;
    btable.appendChild(tr);
  });
  wrap.appendChild(el("div","spacer"));
  wrap.appendChild(btable);
  return wrap;
}

function generatePresentationSpeech(result, momName){
  const lines = [];
  const capTeam = result.winner || result.team1;
  lines.push(`"It was a great team effort today," said the ${capTeam} captain at the presentation.`);
  if(momName && momName!=="-") lines.push(`${momName} collected the Player of the Match award, crediting hours of practice and a clear game plan.`);
  if(result.draw || !result.winner) lines.push(`Both sides shook hands warmly after a hard-fought, evenly-matched contest.`);
  return lines.join(" ");
}
function generatePartyText(team){
  return pick([
    `The dressing room erupted — teammates could be seen singing and dancing as the ${team} celebrations continued long after the final ball.`,
    `Music and laughter filled the ${team} dressing room as the squad celebrated a famous win together.`,
    `Players posed for team photos, phones out, as the ${team} camp soaked in the victory.`,
    `The ${team} support staff and squad gathered for a celebratory huddle, chanting the team song late into the evening.`,
  ]);
}

SCREENS.matchResult = function(){
  const s = el("div","screen");
  const r = MATCH.resultSummary;
  s.appendChild(el("div","eyebrow","MATCH RESULT"));
  s.appendChild(el("h1","pagetitle", r.draw ? "Match Drawn" : (r.winner ? r.winner + " Win" : "Match Tied")));
  s.appendChild(el("p","pagesub", r.margin));

  const card = el("div","card brass");
  let rows = r.scores.map(sc=>`<div class="rowline"><span class="label">${sc.team}</span><span class="val">${sc.runs}/${sc.wkts} (${sc.overs})</span></div>`).join("");
  card.innerHTML = `<h3>${r.venue}</h3>${rows}<div class="rowline"><span class="label">Player of the Match</span><span class="val">${r.mom}</span></div>`;
  s.appendChild(card);

  if(r.formChanges && (r.formChanges.up.length || r.formChanges.down.length)){
    const formCard = el("div","card");
    let html = `<h3>Form Watch</h3>`;
    if(r.formChanges.up.length){
      html += `<p class="small" style="margin:4px 0;"><strong style="color:var(--good);">&#9650; Improved:</strong> ` +
        r.formChanges.up.map(x=>`${x.name} (${x.team})`).join(", ") + `</p>`;
    }
    if(r.formChanges.down.length){
      html += `<p class="small" style="margin:4px 0;"><strong style="color:var(--bad);">&#9660; Dropped:</strong> ` +
        r.formChanges.down.map(x=>`${x.name} (${x.team})`).join(", ") + `</p>`;
    }
    formCard.innerHTML = html;
    s.appendChild(formCard);
  }

  if(r.analysis){
    const analysisCard = el("div","card pitchline");
    analysisCard.innerHTML = `<h3>Expert Analysis</h3><p class="small" style="margin:0;">${r.analysis}</p>`;
    s.appendChild(analysisCard);
  }

  if(r.whatWentWrong){
    const wrongCard = el("div","card leather");
    wrongCard.style.borderLeftColor = "var(--bad)";
    wrongCard.innerHTML = `<h3>What Went Wrong</h3><p class="small" style="margin:0;">${r.whatWentWrong}</p>`;
    s.appendChild(wrongCard);
  }

  if(r.fanDelta){
    const fanCard = el("div","card");
    fanCard.innerHTML = `<h3>Fanbase Movement</h3>` + Object.entries(r.fanDelta).map(([team,delta])=>{
      const sign = delta>=0 ? "+" : "";
      const cls = delta>=0 ? "excellent" : "outofform";
      return `<div class="rowline"><span class="label">${team}</span><span class="val">${(STATE.fanbase[team]||0).toLocaleString()} <span class="badge ${cls}">${sign}${delta.toLocaleString()}</span></span></div>`;
    }).join("");
    s.appendChild(fanCard);
  }

  if(r.financeDelta){
    const finCard = el("div","card brass");
    finCard.innerHTML = `<h3>Match Earnings</h3>` + Object.entries(r.financeDelta).map(([team,delta])=>{
      const sign = delta>=0 ? "+" : "";
      const cls = delta>=0 ? "excellent" : "outofform";
      const bal = STATE.finance[team] ? STATE.finance[team].balance : 0;
      return `<div class="rowline"><span class="label">${team}</span><span class="val">$${bal.toLocaleString()} <span class="badge ${cls}">${sign}$${delta.toLocaleString()}</span></span></div>`;
    }).join("");
    s.appendChild(finCard);
  }

  MATCH.innings.forEach((inn,idx)=> s.appendChild(scorecardBlock(inn, idx)) );

  const menuBtn = el("button","btn leather","Return to Team Dashboard");
  menuBtn.onclick = ()=>{ MATCH=null; goto("careerHub"); };
  s.appendChild(menuBtn);
  const recBtn = el("button","btn outline","View Records");
  recBtn.onclick = ()=>goto("records");
  s.appendChild(recBtn);
  return s;
};

SCREENS.training = function(){
  const s = el("div","screen");
  s.appendChild(el("div","eyebrow","TRAINING CAMP"));
  s.appendChild(el("h1","pagetitle","Training"));
  s.appendChild(el("p","pagesub","Choose a player and run a training session. Sessions take about a minute and give a small, permanent skill boost."));

  const team = SCREEN_ARGS.team || STATE._activeTeam || Object.keys(STATE.squads)[0];
  const groundName = STATE.homeGround && STATE.homeGround[team];
  if(groundName){
    s.appendChild(el("p","small", `Training is taking place at ${groundName}, ${team}'s home ground.`));
  } else {
    s.appendChild(el("p","small","No home ground set yet — training happens at a neutral facility. Set one from the dashboard."));
  }
  const squad = STATE.squads[team];
  const select = el("select");
  select.style.width="100%"; select.style.padding="8px"; select.style.marginBottom="10px";
  squad.forEach(p=>{ const o = el("option",null,`${p.name} (${p.role})`); o.value=p.id; select.appendChild(o); });
  if(SCREEN_ARGS.playerId) select.value = SCREEN_ARGS.playerId;
  s.appendChild(select);

  const currentPlayer = () => squad.find(p=>p.id===parseInt(select.value,10));
  const statsCard = el("div","card brass");
  function renderStatsCard(){
    const p = currentPlayer();
    statsCard.innerHTML = `<h3>Current Attributes</h3>
      <div class="rowline"><span class="label">Batting Skill</span><span class="val">${p.batSkill}</span></div>
      <div class="rowline"><span class="label">Bowling Skill</span><span class="val">${p.bowlSkill}</span></div>
      <div class="rowline"><span class="label">Fitness</span><span class="val">${p.fitness}</span></div>
      <div class="rowline"><span class="label">Form</span><span class="val">${p.form} ${formArrow(p.formTrend)}</span></div>
      <div class="rowline"><span class="label">Age</span><span class="val">${p.age}${p.age>=35?" (veteran)":""}</span></div>`;
  }
  renderStatsCard();
  select.onchange = renderStatsCard;
  s.appendChild(statsCard);

  const focusRow = el("div","stratrow");
  let focus = "Batting";
  ["Batting","Bowling","Fitness"].forEach(f=>{
    const b = el("button", f===focus?"active":"", f);
    b.onclick = ()=>{ focus=f; focusRow.querySelectorAll("button").forEach(x=>x.classList.remove("active")); b.classList.add("active"); };
    focusRow.appendChild(b);
  });
  s.appendChild(focusRow);

  const progWrap = el("div","progwrap");
  const bar = el("div","progbar");
  progWrap.appendChild(bar);
  s.appendChild(progWrap);
  const statusText = el("p","small centered","Ready to train.");
  s.appendChild(statusText);

  const startBtn = el("button","btn leather","Start 1-Minute Session");
  startBtn.onclick = ()=>{
    startBtn.disabled = true;
    const player = currentPlayer();
    let pct = 0;
    statusText.textContent = "Training in progress...";
    const totalMs = 60000; // 1 minute
    const stepMs = 300;
    const timer = setInterval(()=>{
      pct += (stepMs/totalMs)*100;
      bar.style.width = Math.min(100,pct) + "%";
      if(pct>=100){
        clearInterval(timer);
        const formImproved = applyTrainingResult(player, focus, team);
        renderStatsCard();
        statusText.textContent = formImproved
          ? `Session complete — gains applied. Form is now ${player.form}!`
          : `Session complete — gains applied. Form remains ${player.form}.`;
        startBtn.disabled = false;
        save();
      }
    }, stepMs);
  };
  s.appendChild(startBtn);

  const skipBtn = el("button","btn outline small","Simulate Instantly (dev)");
  skipBtn.onclick = ()=>{
    const player = currentPlayer();
    const formImproved = applyTrainingResult(player, focus, team);
    bar.style.width="100%";
    renderStatsCard();
    statusText.textContent = formImproved
      ? `Session complete — gains applied. Form is now ${player.form}!`
      : `Session complete — gains applied. Form remains ${player.form}.`;
    save();
  };
  s.appendChild(skipBtn);

  return s;
};
function applyTrainingResult(player, focus, team){
  const gain = clamp(randi(1,3) + staffTrainingBonus(team, focus), 1, 6);
  if(focus==="Batting"){ player.batSkill = clamp(player.batSkill+gain,30,99); toast(`${player.name}'s batting improved (+${gain}).`); }
  else if(focus==="Bowling"){ player.bowlSkill = clamp(player.bowlSkill+gain,30,99); toast(`${player.name}'s bowling improved (+${gain}).`); }
  else { player.fitness = clamp(player.fitness+gain*2,55,100); toast(`${player.name}'s fitness improved (+${gain*2}).`); }
  player.overall = Math.round((player.batSkill+player.bowlSkill)/2 + 15);
  player.overall = clamp(player.overall, 30, 99);

  // A good session can lift confidence and nudge form up a tier.
  let formImproved = false;
  if(Math.random() < 0.35){
    const idx = FORM_TIERS.indexOf(player.form);
    if(idx < FORM_TIERS.length-1){
      player.form = FORM_TIERS[idx+1];
      player.formTrend = "up";
      formImproved = true;
    }
  }
  return formImproved;
}

function generateRetirementTribute(item){
  const c = item.career;
  const highlight = c.runs>=c.wickets*20
    ? `${c.runs} runs at an average that will be talked about in the dressing room for years`
    : `${c.wickets} wickets, including a best of ${c.bestBowling}`;
  const lines = [];
  lines.push(`After ${c.matches} matches in the ${item.team} shirt, ${item.name} has decided to call time on a long career.`);
  lines.push(`Team-mates describe a dressing room built around consistency — ${highlight}.`);
  if(c.hundreds>0) lines.push(`${c.hundreds} century${c.hundreds===1?"":"ies"} and ${c.fifties} half-centur${c.fifties===1?"y":"ies"} stand as proof of a batting career defined by patience.`);
  if(c.fiveFor>0) lines.push(`${c.fiveFor} five-wicket haul${c.fiveFor===1?"":"s"} tell their own story with the ball.`);
  lines.push(`Fans have flooded the club's socials with tributes — ${item.name} leaves with the crowd's respect and a place in ${item.team}'s history.`);
  return lines.join(" ");
}

SCREENS.careerHub = function(){
  if(STATE._retirementQueue && STATE._retirementQueue.length){
    return SCREENS.retirementCeremony();
  }

  const s = el("div","screen");
  const team = STATE.managedTeam || STATE._activeTeam || Object.keys(STATE.squads)[0];
  ensureFinance(team);
  if(STATE.managedTeam && STATE.schedule.length===0 && !STATE.currentEvent) generateNextEvent();
  const fin = STATE.finance[team];

  // ---------- HERO BANNER ----------
  const hero = el("div","dash-hero");
  hero.innerHTML = `
    <div class="dh-top">
      <span class="dh-flag">${flagOf(team)}</span>
      <span class="dh-season">Season ${STATE.currentYear}</span>
    </div>
    <div class="dh-name">${team}</div>
    <div class="dh-sub">${STATE.profile.managerName}'s Career · ${STATE.matchHistory.length} matches managed</div>
  `;
  s.appendChild(hero);

  const saveBtn = el("button","btn brass","💾 Save Game");
  saveBtn.onclick = ()=>{ save(); toast("Game saved."); };
  s.appendChild(saveBtn);

  // ---------- KEY STATS GRID ----------
  const statGrid = el("div","stat-grid");
  const tiles = [
    ["accent-purple","FANBASE", ensureFanbase(team).toLocaleString()],
    ["accent-gold","CLUB BALANCE", "$"+fin.balance.toLocaleString()],
    ["accent-blue","SQUAD RATING", squadAvg(team)],
    ["accent-green","LAST 5", recentFormChips(team)],
  ];
  tiles.forEach(([cls,label,val])=>{
    const tile = el("div","stat-tile "+cls);
    tile.innerHTML = `<div class="stat-label">${label}</div><div class="stat-value">${val}</div>`;
    statGrid.appendChild(tile);
  });
  s.appendChild(statGrid);

  // ---------- NEXT FIXTURE ----------
  if(STATE.schedule.length>0){
    const fixture = STATE.schedule[0];
    const ev = STATE.currentEvent;
    const eventLabel = { bilateral:"Bilateral Series", tri:"Tri-Series", worldcup: (ev&&ev.cupName)||"World Cup", custom: (ev&&ev.name)||"Custom Tournament" }[fixture.kind] || "Fixture";
    const fxCard = el("div","fixture-hero");
    fxCard.innerHTML = `<div class="fh-tag">Next Fixture · ${eventLabel}</div>
      <div class="fh-title">${fixture.label}</div>
      <div class="rowline"><span class="label">Format</span><span class="val">${fixture.mode}</span></div>
      <div class="rowline"><span class="label">Host Country</span><span class="val">${flagOf(fixture.host)} ${fixture.host}</span></div>
      <div class="rowline"><span class="label">Venue</span><span class="val">${fixture.venue.name}</span></div>`;
    s.appendChild(fxCard);
    const nextBtn = el("button","btn leather","▶ Next: Play This Match");
    nextBtn.onclick = ()=>{
      if(ev && !ev.squad14){
        goto("seriesSquadSelect", { fixture, team });
      } else if(ev && ev.squad14){
        goto("xiSelect14", { fixture, team });
      } else {
        goto("xiSelect", { mode:fixture.mode, userTeam:team, oppTeam:fixture.opponent, _venue:fixture.venue, _venueHomeTeam:fixture.venueHomeTeam, _fixture:fixture });
      }
    };
    s.appendChild(nextBtn);
    if(ev && (ev.type==="tri" || ev.type==="worldcup" || (ev.type==="custom" && ev.customKind==="roundrobin"))){
      const tableBtn = el("button","btn small outline","📊 View Points Table");
      tableBtn.onclick = ()=>goto("eventTable");
      s.appendChild(tableBtn);
    }
  }

  // ---------- CLUB DETAIL CARDS ----------
  const teamCard = el("div","card");
  teamCard.innerHTML = `<h3>Club Overview</h3>
    <div class="rowline"><span class="label">Home Ground</span><span class="val">${STATE.homeGround[team] || "Not set"}</span></div>
    <div class="rowline"><span class="label">Team Value</span><span class="val">$${fin.value.toLocaleString()}</span></div>
    <div class="rowline"><span class="label">Annual Wage Bill</span><span class="val">$${fin.wageBill.toLocaleString()}</span></div>`;
  s.appendChild(teamCard);

  const injured = STATE.squads[team].filter(p=>p.injury.injured);
  if(injured.length){
    const injCard = el("div","card leather");
    injCard.style.borderLeftColor = "var(--bad)";
    injCard.innerHTML = `<h3>🩹 Injury Table</h3>` + injured.map(p=>
      `<div class="rowline"><span class="label">${p.name}</span><span class="val">${p.injury.type} · ${p.injury.daysLeft} left</span></div>`
    ).join("");
    s.appendChild(injCard);
  }

  const newMatchBtn = el("button","btn outline","Play Exhibition Match");
  newMatchBtn.onclick = ()=>goto("newGameMode");
  s.appendChild(newMatchBtn);

  // ---------- QUICK ACTIONS ----------
  const actionsTitle = el("div","section-title","Quick Actions");
  s.appendChild(actionsTitle);
  const actions = [
    ["👔","Coaching Staff","staffHub"],
    ["⚔️","Rivalries","rivalries"],
    ["📈","Player Stats","playerStats"],
    ["🗺️","Team Maps","teamMaps"],
    ["🔎","Scout","scoutHub"],
    ["🏆","Elite Players","hallOfFame"],
    ["📋","Dropped Players","droppedPlayers"],
    ["💬","Social Life","socialLife"],
    ["🏟️","Home Ground","selectHomeGround"],
    ["🤝","Sponsors","sponsorsHub"],
    ["✨","Create Tournament","createTournament"],
  ];
  const actionsGrid = el("div","quick-actions");
  actions.forEach(([icon,label,dest])=>{
    const b = el("div","quick-action-btn", `<div class="qa-icon">${icon}</div><div>${label}</div>`);
    b.onclick = ()=>goto(dest);
    actionsGrid.appendChild(b);
  });
  s.appendChild(actionsGrid);

  // ---------- NEWS FEED ----------
  const newsTitle = el("div","section-title","Cricket News");
  if((STATE.newsFeed||[]).length>0){
    const clearBtn = el("button","btn small outline st-action","Clear");
    clearBtn.onclick = ()=>{ STATE.newsFeed = []; save(); goto("careerHub"); };
    newsTitle.appendChild(clearBtn);
  }
  s.appendChild(newsTitle);
  s.appendChild(renderNewsFeed(8));

  // ---------- RECENT RESULTS ----------
  s.appendChild(el("div","section-title","Recent Results"));
  if(STATE.matchHistory.length===0){
    s.appendChild(el("p","small","No matches played yet."));
  } else {
    STATE.matchHistory.slice(-8).reverse().forEach(m=>{
      const c = el("div","card");
      const line = m.draw ? `${m.team1} vs ${m.team2} — Draw` : `${m.winner} ${m.margin} vs ${m.team1===m.winner?m.team2:m.team1}`;
      c.innerHTML = `<h3>${m.mode} · ${m.venue}</h3><p class="small" style="margin:0;">${line}</p><p class="small" style="margin:0;color:var(--ink-soft);">POTM: ${m.mom}</p>`;
      s.appendChild(c);
    });
  }

  return s;
};

SCREENS.createTournament = function(){
  const team = STATE.managedTeam;
  if(!SCREEN_ARGS._name) SCREEN_ARGS._name = "";
  if(!SCREEN_ARGS._sponsor) SCREEN_ARGS._sponsor = "";
  if(!SCREEN_ARGS._teams) SCREEN_ARGS._teams = [team];

  if(!SCREEN_ARGS._matchCount) SCREEN_ARGS._matchCount = 3;

  const s = el("div","screen");
  s.appendChild(el("div","eyebrow","CREATE"));
  s.appendChild(el("h1","pagetitle","Create Series / Tournament"));
  s.appendChild(el("p","pagesub","Design your own series or tournament — name it, pick a sponsor, choose the teams and format."));

  const nameInput = el("input");
  nameInput.type="text"; nameInput.placeholder="Tournament name (e.g. Champions Cup)";
  nameInput.value = SCREEN_ARGS._name;
  nameInput.style.width="100%"; nameInput.style.padding="10px"; nameInput.style.marginBottom="8px"; nameInput.style.border="1px solid var(--line)"; nameInput.style.borderRadius="var(--radius)"; nameInput.style.background="var(--paper-2)"; nameInput.style.color="var(--ink)";
  nameInput.oninput = ()=>{ SCREEN_ARGS._name = nameInput.value; };
  s.appendChild(nameInput);

  const sponsorInput = el("input");
  sponsorInput.type="text"; sponsorInput.placeholder="Sponsor name (optional)";
  sponsorInput.value = SCREEN_ARGS._sponsor;
  sponsorInput.style.width="100%"; sponsorInput.style.padding="10px"; sponsorInput.style.marginBottom="12px"; sponsorInput.style.border="1px solid var(--line)"; sponsorInput.style.borderRadius="var(--radius)"; sponsorInput.style.background="var(--paper-2)"; sponsorInput.style.color="var(--ink)";
  sponsorInput.oninput = ()=>{ SCREEN_ARGS._sponsor = sponsorInput.value; };
  s.appendChild(sponsorInput);

  s.appendChild(el("h3",null,"Format"));
  const modeRow = el("div","stratrow");
  ["T20","ODI"].forEach(m=>{
    const b = el("button", SCREEN_ARGS._mode===m?"active":"", m);
    b.onclick = ()=>{ SCREEN_ARGS._mode = m; goto("createTournament", SCREEN_ARGS); };
    modeRow.appendChild(b);
  });
  s.appendChild(modeRow);

  s.appendChild(el("h3",null,"Participating Teams (" + SCREEN_ARGS._teams.length + " selected)"));
  s.appendChild(el("p","small","Your team is locked in. Select at least one more."));
  const grid = el("div","gridsel");
  TEAM_LIST.forEach(t=>{
    const isUser = t===team;
    const selected = SCREEN_ARGS._teams.includes(t);
    const opt = el("div","opt" + (selected?" active":""));
    opt.innerHTML = `${flagOf(t)} ${t}${isUser?" (You)":""}`;
    if(!isUser){
      opt.onclick = ()=>{
        const idx = SCREEN_ARGS._teams.indexOf(t);
        if(idx>-1) SCREEN_ARGS._teams.splice(idx,1);
        else SCREEN_ARGS._teams.push(t);
        goto("createTournament", SCREEN_ARGS);
      };
    } else {
      opt.style.opacity = "0.85";
    }
    grid.appendChild(opt);
  });
  s.appendChild(grid);

  if(SCREEN_ARGS._teams.length===2){
    s.appendChild(el("h3",null,"Total Matches"));
    const matchRow = el("div","stratrow");
    [3,5,7].forEach(n=>{
      const b = el("button", SCREEN_ARGS._matchCount===n?"active":"", n+" Matches");
      b.onclick = ()=>{ SCREEN_ARGS._matchCount = n; goto("createTournament", SCREEN_ARGS); };
      matchRow.appendChild(b);
    });
    s.appendChild(matchRow);
  } else if(SCREEN_ARGS._teams.length>2){
    const n = SCREEN_ARGS._teams.length;
    const totalMatches = n*(n-1)/2;
    s.appendChild(el("p","small", `Round-robin format — every team plays every other team once. Total matches: ${totalMatches} (you play ${n-1}).`));
  }

  const startBtn = el("button","btn leather","Start Tournament");
  startBtn.disabled = !SCREEN_ARGS._name.trim() || SCREEN_ARGS._teams.length<2;
  startBtn.onclick = ()=>{
    if(STATE.currentEvent){
      if(!confirm("This will replace your current series/tournament in progress. Continue?")) return;
    }
    startCustomTournament(SCREEN_ARGS._name.trim(), SCREEN_ARGS._sponsor.trim(), SCREEN_ARGS._teams.slice(), SCREEN_ARGS._mode, SCREEN_ARGS._matchCount);
    toast(`${SCREEN_ARGS._name.trim()} created!`);
    goto("careerHub");
  };
  s.appendChild(startBtn);

  return s;
};

/* ===================== SPONSORSHIP SCREENS ===================== */
SCREENS.sponsorsHub = function(){
  const team = STATE.managedTeam || STATE._activeTeam;
  const sp = ensureSponsors(team);
  ensureFinance(team);
  const s = el("div","screen");
  s.appendChild(el("div","eyebrow","SPONSORSHIPS"));
  s.appendChild(el("h1","pagetitle", team + " Sponsors"));
  s.appendChild(el("p","pagesub","Sponsors pay a signing bonus plus ongoing per-match income. Better tiers also give small in-game perks."));
  s.appendChild(el("p","small", `Club Balance: $${STATE.finance[team].balance.toLocaleString()}`));

  SPONSOR_CATEGORIES.forEach(cat=>{
    const current = sp[cat];
    const card = el("div","card" + (current?" brass":""));
    if(current){
      card.innerHTML = `<h3>${SPONSOR_LABEL[cat]}</h3>
        <div class="rowline"><span class="label">${current.name}</span><span class="val">${current.tier}</span></div>
        <div class="rowline"><span class="label">Per-Match Income</span><span class="val">$${current.perMatchFee.toLocaleString()}</span></div>
        <div class="rowline"><span class="label">Contract</span><span class="val">${current.yearsLeft} of ${current.contractYears} yrs left</span></div>`;
    } else {
      card.innerHTML = `<h3>${SPONSOR_LABEL[cat]}</h3><p class="small" style="margin:0;">No sponsor signed.</p>`;
    }
    const btn = el("button","btn small leather", current ? "Find New Sponsor" : "Find Sponsor");
    btn.onclick = ()=>goto("signSponsor", { team, category:cat });
    card.appendChild(btn);
    s.appendChild(card);
  });

  return s;
};

SCREENS.signSponsor = function(){
  const { team, category } = SCREEN_ARGS;
  ensureFinance(team);
  if(!SCREEN_ARGS._pool) SCREEN_ARGS._pool = genSponsorPool(category, 5);
  const pool = SCREEN_ARGS._pool;
  const s = el("div","screen");
  s.appendChild(el("div","eyebrow","SIGN · " + SPONSOR_LABEL[category].toUpperCase()));
  s.appendChild(el("h1","pagetitle","Available Sponsors"));
  s.appendChild(el("p","pagesub","Pick a sponsor and a contract length. A signing bonus is paid immediately."));

  pool.forEach(candidate=>{
    const card = el("div","card");
    card.innerHTML = `<h3>${candidate.name}</h3>
      <div class="rowline"><span class="label">Tier</span><span class="val">${candidate.tier}</span></div>
      <div class="rowline"><span class="label">Per-Match Income</span><span class="val">$${candidate.perMatchFee.toLocaleString()}</span></div>`;
    const row = el("div","stratrow");
    [1,2,3,4].forEach(years=>{
      const bonus = Math.round(candidate.perMatchFee*years*6);
      const btn = el("button", null, `${years}yr — $${(bonus/1000).toFixed(0)}k bonus`);
      btn.onclick = ()=>{
        signSponsor(team, category, candidate, years);
        toast(`${candidate.name} signed as ${SPONSOR_LABEL[category]}.`);
        goto("sponsorsHub");
      };
      row.appendChild(btn);
    });
    card.appendChild(row);
    s.appendChild(card);
  });

  const rescoutBtn = el("button","btn outline","See Different Sponsors");
  rescoutBtn.onclick = ()=>{ SCREEN_ARGS._pool = genSponsorPool(category, 5); goto("signSponsor", SCREEN_ARGS); };
  s.appendChild(rescoutBtn);
  return s;
};

/* ===================== HOME GROUND ===================== */
SCREENS.selectHomeGround = function(){
  const team = STATE.managedTeam || STATE._activeTeam;
  const s = el("div","screen");
  s.appendChild(el("div","eyebrow","HOME GROUND"));
  s.appendChild(el("h1","pagetitle","Manage Your Home Ground"));
  s.appendChild(el("p","pagesub","Choose the stadium where your team trains and plays home fixtures. This venue will be used whenever " + team + " hosts a match."));
  VENUES[team].forEach(v=>{
    const isSelected = STATE.homeGround[team]===v.name;
    const card = el("div","card" + (isSelected?" brass":""));
    card.style.cursor = "pointer";
    card.innerHTML = `<h3>${v.name}${isSelected?" ✓":""}</h3>
      <div class="rowline"><span class="label">Pitch</span><span class="val">${v.pitch}</span></div>
      <div class="rowline"><span class="label">Home Advantage</span><span class="val">+${v.adv}</span></div>
      <div class="rowline"><span class="label">Average Score</span><span class="val">${v.avg}</span></div>`;
    card.onclick = ()=>{
      STATE.homeGround[team] = v.name;
      save();
      toast(`${v.name} set as your home ground.`);
      goto("careerHub");
    };
    s.appendChild(card);
  });
  return s;
};

/* ===================== COACHING STAFF SCREEN ===================== */
SCREENS.staffHub = function(){
  const team = STATE._activeTeam || Object.keys(STATE.squads)[0];
  const staff = ensureStaff(team);
  ensureFinance(team);
  const s = el("div","screen");
  s.appendChild(el("div","eyebrow","COACHING STAFF"));
  s.appendChild(el("h1","pagetitle", team + " Support Staff"));
  s.appendChild(el("p","pagesub","Better coaches boost match performance and training gains. Contracts run 2/3/5/8 years and expire automatically."));
  s.appendChild(el("p","small", `Club Balance: $${STATE.finance[team].balance.toLocaleString()}`));

  const roles = [["battingCoach","Batting Coach","Improves batting performance and training gains."],
    ["bowlingCoach","Bowling Coach","Improves bowling performance and training gains."],
    ["fieldingCoach","Fielding Coach","Reduces boundaries conceded in the field."],
    ["assistantCoach","Assistant Coach","Gives a small all-round boost to the whole team."],
    ["physio","Physio","Cuts injury chance and speeds up recovery."]];
  roles.forEach(([key,label,desc])=>{
    const person = staff[key];
    const card = el("div","card");
    card.innerHTML = `<h3>${label}</h3><p class="small" style="margin:0 0 6px 0;color:var(--ink-soft);">${desc}</p>
      <div class="rowline"><span class="label">${person.name}</span><span class="val">Rating ${person.rating}</span></div>
      <div class="rowline"><span class="label">Contract</span><span class="val">${person.yearsLeft} of ${person.contractYears} yrs left</span></div>`;
    const hireBtn = el("button","btn small leather","Sign New Coach");
    hireBtn.onclick = ()=>goto("hireCoach", { team, role:key, label });
    card.appendChild(hireBtn);
    s.appendChild(card);
  });
  return s;
};

/* ===================== HIRE COACH (15 candidates, contract lengths) ===================== */
SCREENS.hireCoach = function(){
  const { team, role, label } = SCREEN_ARGS;
  ensureFinance(team);
  if(!SCREEN_ARGS._pool) SCREEN_ARGS._pool = genCoachPool(role, 15);
  const pool = SCREEN_ARGS._pool;
  const s = el("div","screen");
  s.appendChild(el("div","eyebrow","HIRE · " + label.toUpperCase()));
  s.appendChild(el("h1","pagetitle","Available Candidates"));
  s.appendChild(el("p","pagesub", `Club Balance: $${STATE.finance[team].balance.toLocaleString()}. Pick a candidate and a contract length.`));

  pool.slice().sort((a,b)=>b.rating-a.rating).forEach(candidate=>{
    const card = el("div","card");
    card.innerHTML = `<h3>${candidate.name}</h3><div class="rowline"><span class="label">Rating</span><span class="val">${candidate.rating}</span></div>`;
    const row = el("div","stratrow");
    [2,3,5,8].forEach(years=>{
      const cost = coachContractCost(candidate.rating, years);
      const btn = el("button", null, `${years}yr — $${(cost/1000).toFixed(0)}k`);
      btn.onclick = ()=>{
        const res = hireCoach(team, role, candidate, years);
        if(!res.ok){ toast("Not enough funds for this contract."); return; }
        toast(`${candidate.name} signed for ${years} years.`);
        goto("staffHub");
      };
      row.appendChild(btn);
    });
    card.appendChild(row);
    s.appendChild(card);
  });

  const rescoutBtn = el("button","btn outline","See Different Candidates");
  rescoutBtn.onclick = ()=>{ SCREEN_ARGS._pool = genCoachPool(role, 15); goto("hireCoach", SCREEN_ARGS); };
  s.appendChild(rescoutBtn);
  return s;
};

/* ===================== RIVALRIES SCREEN ===================== */
SCREENS.rivalries = function(){
  const team = STATE._activeTeam || Object.keys(STATE.squads)[0];
  const s = el("div","screen");
  s.appendChild(el("div","eyebrow","RIVALRIES"));
  s.appendChild(el("h1","pagetitle", team + " Rivalries"));
  const recs = Object.values(STATE.h2h||{}).filter(r=>r.teams.includes(team)).sort((a,b)=>b.matches-a.matches);
  if(recs.length===0){
    s.appendChild(el("p","small","No head-to-head history yet. Play more matches against the same opponents to build a rivalry."));
  }
  recs.forEach(rec=>{
    const opp = rec.teams.find(t=>t!==team);
    const myWins = (rec.wins&&rec.wins[team])||0, oppWins = (rec.wins&&rec.wins[opp])||0, ties = rec.ties||0;
    const card = el("div","card brass");
    card.innerHTML = `<h3>${team} vs ${opp}</h3>
      <div class="rowline"><span class="label">Label</span><span class="val">${rivalryLabel(rec)}</span></div>
      <div class="rowline"><span class="label">Matches Played</span><span class="val">${rec.matches}</span></div>
      <div class="rowline"><span class="label">Record</span><span class="val">${myWins}-${oppWins}${ties?` (${ties} tied)`:""}</span></div>`;
    s.appendChild(card);
  });
  return s;
};

/* ===================== PLAYER STATS LEADERBOARD ===================== */
SCREENS.playerStats = function(){
  const s = el("div","screen");
  s.appendChild(el("div","eyebrow","PLAYER STATS"));
  s.appendChild(el("h1","pagetitle","Leaderboards"));
  let all = [];
  Object.entries(STATE.squads).forEach(([team,squad])=>squad.forEach(p=>all.push({...p, team})));

  s.appendChild(el("h3",null,"Most Runs"));
  const topRuns = all.slice().sort((a,b)=>b.career.runs-a.career.runs).slice(0,10);
  const t1 = el("table","stattable");
  t1.innerHTML = `<tr><th>Player</th><th>Team</th><th>Runs</th><th>Avg</th></tr>` + topRuns.map(p=>{
    const avg = p.career.matches>0 ? (p.career.runs/Math.max(1,p.career.matches)).toFixed(1) : "0.0";
    return `<tr><td>${p.name}</td><td>${p.team}</td><td>${p.career.runs}</td><td>${avg}</td></tr>`;
  }).join("");
  s.appendChild(t1);
  s.appendChild(el("div","spacer"));

  s.appendChild(el("h3",null,"Most Wickets"));
  const topWkts = all.slice().sort((a,b)=>b.career.wickets-a.career.wickets).slice(0,10);
  const t2 = el("table","stattable");
  t2.innerHTML = `<tr><th>Player</th><th>Team</th><th>Wkts</th><th>Best</th></tr>` + topWkts.map(p=>
    `<tr><td>${p.name}</td><td>${p.team}</td><td>${p.career.wickets}</td><td>${p.career.bestBowling}</td></tr>`
  ).join("");
  s.appendChild(t2);

  return s;
};

/* ===================== RECORDS ===================== */
SCREENS.records = function(){
  const s = el("div","screen");
  s.appendChild(el("div","eyebrow","RECORDS & STATISTICS"));
  s.appendChild(el("h1","pagetitle","All-Time Records"));

  const history = STATE.matchHistory || [];
  let highestTeam={val:0,who:"-"}, lowestTeam={val:9999,who:"-"};
  history.forEach(m=>m.scores.forEach(sc=>{
    if(sc.runs>highestTeam.val) highestTeam={val:sc.runs,who:`${sc.team} (${sc.runs}/${sc.wkts})`};
    if(sc.runs<lowestTeam.val) lowestTeam={val:sc.runs,who:`${sc.team} (${sc.runs}/${sc.wkts})`};
  }));
  if(history.length===0){ lowestTeam={val:0,who:"-"}; }

  let bestInd={val:0,who:"-"}, bestBowl={wkts:-1,runs:999,who:"-"}, mostRuns={val:0,who:"-"}, mostWkts={val:0,who:"-"};
  Object.entries(STATE.squads).forEach(([team,squad])=>{
    squad.forEach(p=>{
      if(p.career.highScore>bestInd.val) bestInd={val:p.career.highScore,who:`${p.name} (${team})`};
      if(p.career.runs>mostRuns.val) mostRuns={val:p.career.runs,who:`${p.name} (${team})`};
      if(p.career.wickets>mostWkts.val) mostWkts={val:p.career.wickets,who:`${p.name} (${team})`};
      const [w,r] = (p.career.bestBowling||"0/0").split("/").map(Number);
      if(w>bestBowl.wkts || (w===bestBowl.wkts && r<bestBowl.runs && w>0)) bestBowl={wkts:w,runs:r,who:`${p.name} (${team})`};
    });
  });

  const card = el("div","card brass");
  card.innerHTML = `
    <div class="rowline"><span class="label">Highest Team Score</span><span class="val">${highestTeam.who}</span></div>
    <div class="rowline"><span class="label">Lowest Team Score</span><span class="val">${lowestTeam.who}</span></div>
    <div class="rowline"><span class="label">Highest Individual Score</span><span class="val">${bestInd.who}</span></div>
    <div class="rowline"><span class="label">Best Bowling Figures</span><span class="val">${bestBowl.wkts>=0?bestBowl.who:"-"}</span></div>
    <div class="rowline"><span class="label">Most Career Runs</span><span class="val">${mostRuns.who}</span></div>
    <div class="rowline"><span class="label">Most Career Wickets</span><span class="val">${mostWkts.who}</span></div>
  `;
  s.appendChild(card);

  s.appendChild(el("h3",null,"Match History"));
  if(history.length===0) s.appendChild(el("p","small","No matches recorded yet."));
  history.slice().reverse().forEach(m=>{
    const c = el("div","card");
    const line = m.draw ? `${m.team1} vs ${m.team2} — Draw` : `${m.winner} ${m.margin}`;
    c.innerHTML = `<h3>${m.mode} at ${m.venue}</h3><p class="small" style="margin:0;">${line}</p>`;
    s.appendChild(c);
  });

  return s;
};

/* ===================== BOOT ===================== */
function boot(){
  render();
}
boot();

})();
